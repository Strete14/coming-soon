<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <title>Coming Soon</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
    }

    .container {
      position: relative;
      width: 100%;
      height: 100%;
    }

    /* LOGO */
    .logo {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.85);
      width: 90vw;
      max-height: 90vh;

      opacity: 0;
      filter: blur(12px);

      animation:
        logoFadeIn 3.5s ease forwards,
        logoStay 4s ease 3.5s forwards,
        logoFadeOut 3.5s ease 7.5s forwards;
    }

    @keyframes logoFadeIn {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.85);
        filter: blur(12px);
      }
      100% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
        filter: blur(0);
      }
    }

    @keyframes logoStay {
      from { opacity: 1; }
      to { opacity: 1; }
    }

    @keyframes logoFadeOut {
      0% {
        opacity: 1;
        filter: blur(0);
      }
      100% {
        opacity: 0;
        filter: blur(20px);
      }
    }

    /* TEXT */
    .coming-soon {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      
      font-size: 44px;
      color: #2ee8a0; /* verde din logo */
      letter-spacing: 3px;

      opacity: 0;
      text-align: center;
      width: 100%;
      padding: 0 20px;

      animation: textFadeIn 2.5s ease 11s forwards;
    }

    @keyframes textFadeIn {
      from {
        opacity: 0;
        transform: translate(-50%, -40%);
      }
      to {
        opacity: 1;
        transform: translate(-50%, -50%);
      }
    }

    /* RESPONSIVE (mobil) */
    @media (max-width: 600px) {
      .coming-soon {
        font-size: 28px;
        letter-spacing: 2px;
      }
    }

  </style>
</head>
<body>

  <div class="container">
    <img src="logo.svg" alt="Logo" class="logo">
    <div class="coming-soon">Coming Soon!</div>
  </div>

</body>
</html>
