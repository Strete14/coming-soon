  async function generatePlan(intakeData, checkIn = null) {
    if (!intakeData) { console.warn("generatePlan called with no intake data"); return; }
    go("loading");
    setError("");

    const langNames = {en:"English",ro:"Romanian",de:"German",fr:"French",it:"Italian",es:"Spanish"};
    const targetLang = langNames[lang] || "English";

    // Pain/day rules for prompt
    const painLevel = intakeData.pain;
    const approach = painLevel >= 7 ? "gentle pain relief and ROM only — no loading"
                   : painLevel >= 4 ? "balance pain relief with gentle strengthening"
                   : "progressive strengthening and functional rehab";
    // Day-specific exercise variation rules
    // Use override day number if provided (from check-in flow)
    const effectiveDayNum = intakeData._dayOverride || dayNum;
    const dayPhase = effectiveDayNum <= 3 ? 1 : effectiveDayNum <= 7 ? 2 : effectiveDayNum <= 14 ? 3 : 4;
    const dayApproach = effectiveDayNum <= 3
      ? "gentle, protective exercises — isometric holds, pain-free ROM only, no loading"
      : effectiveDayNum <= 7
      ? "progressive strengthening — introduce light resistance, closed-chain exercises, balance work"
      : effectiveDayNum <= 14
      ? "functional strengthening — increase load, proprioception, sport-specific movements"
      : "return-to-activity — full loading, complex movements, endurance and power";

    // Generate a seed based on day number to ensure variety
    const daySeed = effectiveDayNum * 7 + (intakeData.pain || 5) * 3;
    const dayVariety = `Day ${effectiveDayNum} variety seed: ${daySeed}`;

    // Build previously used exercise keys for variety — must be before systemPrompt
    const prevUsed = planHistory
      .filter(p => p.plan?.exercises)
      .flatMap(p => (p.plan.exercises || []).map(e => e.exerciseKey))
      .filter(Boolean)
      .join(", ") || "none yet";
    const allergies = (intakeData.allergies||[]).filter(x=>x!=="none").join(", ") || "none";

    const systemPrompt = `You are a senior physiotherapist. Respond ONLY with valid JSON — no markdown, no extra text, no explanations.
All string values in ${targetLang} EXCEPT exerciseKey (always English).

EXERCISE KEYS for body area (use exact spelling):
NECK: chin_tuck, neck_side_bend, neck_rotation, upper_trap_stretch, levator_scapulae_stretch, scalene_stretch, neck_flexion_stretch, cervical_rotation_stretch, isometric_neck_flexion, isometric_neck_extension, isometric_neck_side, thoracic_extension, t_spine_rotation, chin_tuck_with_extension
SHOULDER: pendulum_swing, shoulder_shrug, wall_crawl, external_rotation, internal_rotation, scapular_retraction, lateral_raise, front_raise, doorway_stretch, cross_body_stretch, resistance_band_row, shoulder_circles, wall_push_up, sleeper_stretch, pec_minor_stretch, empty_can, full_can, serratus_punch, overhead_press, prone_w_raise, rotator_cuff_side_lying, wall_slide, shoulder_horizontal_abduction
UPPER BACK: seated_row, lat_pulldown, wall_angel, band_pull_apart, face_pull, prone_y_raise, prone_t_raise, foam_roller_thoracic, rhomboid_stretch, open_book_rotation, prone_cobra, middle_trap_exercise, lower_trap_exercise, rib_grab_stretch, thoracic_rotation_stretch
LOWER BACK: pelvic_tilt, dead_bug, superman, childs_pose, knee_to_chest, mcgill_curl_up, side_plank, bird_dog, cat_cow, hip_flexor_stretch, prone_press_up, standing_back_extension, double_knee_to_chest, seated_lumbar_rotation, pallof_press, back_extension_bench, mckenzie_extension
HIP: hip_abduction, hip_adduction, pigeon_stretch, side_lying_abduction, prone_hip_extension, figure_4_stretch, seated_hip_abduction, lateral_band_walk, monster_walk, seated_piriformis_stretch, hip_90_90_rotation, clam_with_band, adductor_squeeze, hip_hike, glute_bridge
KNEE: straight_leg_raise, short_arc_quad, terminal_knee_extension, quad_sets, hamstring_curl, heel_slide, mini_squat, wall_sit, step_up, step_down, single_leg_balance, knee_flexion_stretch, nordic_hamstring_curl, box_squat, reverse_lunge, lateral_lunge, it_band_stretch, vastus_medialis_squeeze
ANKLE/FOOT: heel_raise, ankle_circles, tibialis_raise, achilles_stretch, towel_scrunch, heel_walk, toe_walk, single_leg_heel_raise, star_excursion_balance, ankle_alphabet, plantar_fascia_stretch, foot_doming, calf_stretch_straight, calf_stretch_bent, lateral_ankle_hops
ELBOW/WRIST: wrist_flexion, wrist_extension, forearm_rotation, eccentric_wrist_curl, elbow_flexion, elbow_extension, tennis_elbow_stretch, golfers_elbow_stretch, grip_strengthening, finger_extension_band, pronator_stretch, supinator_stretch, radial_deviation, ulnar_deviation
CORE: plank, forearm_plank, dead_bug, pallof_press_rotation, single_leg_deadlift, glute_kickback, fire_hydrant, transverse_abdominis_activation, diaphragmatic_breathing

RULES:
- Match exercises to body area only
- Equipment: home_none=bodyweight, home_basic=bands/foam roller, home_full=dumbbells/bench, gym=machines
- Safety: surgery=gentle ROM only, cardiac=low intensity, pregnancy=safe modifications, osteoporosis=no spinal flexion
- Day ${effectiveDayNum} of 7: select DIFFERENT exercises from previous days. Previously used: ${prevUsed||"none yet"}
- Nutrition: avoid allergens (${allergies||"none"}), include accurate macros per meal
- Keep ALL text fields under 50 words for efficiency

Return this exact JSON structure:
{"title":"","region":"","totalDuration":"","tags":["","",""],
"phases":[{"name":"","duration":"","goal":"","milestones":""}],
"exercises":[{"exerciseKey":"","name":"","sets":"","reps":"","rest":"","startPosition":"","description":"","progressionTip":"","precautions":""}],
"electrotherapy":[{"name":"","icon":"⚡","duration":"","frequency":"","protocol":"","placement":"","parameters":""}],
"nutrition":{"dailySummary":"","antiInflammatoryTip":"","breakfast":{"meal":"","calories":0,"protein":0,"carbs":0,"fat":0},"morningSnack":{"meal":"","calories":0,"protein":0,"carbs":0,"fat":0},"lunch":{"meal":"","calories":0,"protein":0,"carbs":0,"fat":0},"afternoonSnack":{"meal":"","calories":0,"protein":0,"carbs":0,"fat":0},"dinner":{"meal":"","calories":0,"protein":0,"carbs":0,"fat":0},"sleepTip":"","hydration":"","supplements":[""],"foodsToAvoid":""}}
IMPORTANT: Include exactly 7 exercises and exactly 2 electrotherapy procedures. Complete the entire JSON before stopping.`;

    const userPrompt = `Generate a rehabilitation plan for this patient:
- Body area: ${intakeData.area}
- Specific location: ${intakeData.specific || "general"}
- Pain level: ${intakeData.pain}/10
- Stiffness: ${intakeData.stiffness}/10
- Duration of symptoms: ${intakeData.duration}
- What makes it worse: ${(intakeData.triggers||[intakeData.trigger]).filter(Boolean).join(", ")||"not specified"}
- Previous physiotherapy: ${intakeData.prevPhysio}
- Main goals: ${(intakeData.goals||[intakeData.goal]).filter(Boolean).join(", ")||"general rehabilitation"}
- Available equipment: ${{home_none:"No equipment",home_basic:"Basic home equipment (bands, foam roller)",home_full:"Home gym (dumbbells, bench)",gym:"Full gym access"}[intakeData.equipment]||"Basic home equipment"}
- Dietary restrictions: ${(intakeData.allergies||[]).filter(x=>x!=="none").join(", ")||"none"}
- Safety flags: ${intakeData.safetyFlags?.length ? intakeData.safetyFlags.join(", ") : "none"}
- Programme day: ${effectiveDayNum} (Phase ${dayPhase})
- Day approach: ${dayApproach}
- Language: ${targetLang}
${checkIn ? `- Today's check-in: pain ${checkIn.pain}/10, energy ${checkIn.energy}/10` : ""}`;

    let res;
    try {
      // Retry up to 3 times with exponential backoff for server errors
      let lastErr = null;
      for (let attempt = 1; attempt <= 3; attempt++) {
        try {
          res = await fetch("/api/generate", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              model: "claude-haiku-4-5-20251001",
              max_tokens: 7000,
              system: systemPrompt,
              messages: [{ role: "user", content: userPrompt }],
            }),
          });
          // Break if successful or client error (not worth retrying)
          if (res.status < 500) break;
          lastErr = `HTTP ${res.status}`;
        } catch(fetchErr) {
          lastErr = fetchErr.message;
          res = null;
        }
        if (attempt < 3) {
          const delay = attempt * 4000; // 4s, 8s
          setError(`Server busy — retrying in ${delay/1000}s... (attempt ${attempt}/3)`);
          await new Promise(r => setTimeout(r, delay));
          setError("");
        }
      }
      if (!res) throw new Error(lastErr || "Network error");
      const data = await res.json();
      if (data.error) {
        const errMsg = data.error?.message || JSON.stringify(data.error);
        const errType = data.error?.type || "unknown";
        console.error("API Error:", errType, errMsg);
        // Overloaded — give a friendly message
        if (errType === "overloaded_error" || errMsg.includes("overloaded") || errMsg.includes("529") || errMsg.includes("500") || errMsg.includes("Internal server")) {
          setError("The AI service is temporarily busy. Please wait 30 seconds and tap Generate again.");
        } else {
          setError(`Could not generate plan: ${errMsg}`);
        }
        go("quiz");
        return;
      }
      if (!data.content || data.content.length === 0) {
        setError("Empty response from API. Please try again.");
        go("quiz");
        return;
      }
      const raw = (data.content || []).map(b => b.text || "").join("").trim();
      const clean = raw.replace(/^```json\s*/,"").replace(/^```\s*/,"").replace(/\s*```$/,"").trim();
      let parsed;
      try {
        parsed = JSON.parse(clean);
      } catch (parseErr) {
        console.error("JSON parse error:", parseErr.message);
        console.error("Raw response length:", raw.length);
        console.error("Raw response end:", raw.slice(-200));
        setError(`Plan generation failed: response was cut off. Please try again.`);
        go("quiz");
        return;
      }
      // Keep original diagnosis/title for day 2+ — only exercises change
      const effectivePlan = parsed;
      if (intakeData._dayOverride && intakeData._dayOverride > 1 && plan) {
        effectivePlan.title  = effectivePlan.title  || plan.title;
        effectivePlan.region = effectivePlan.region || plan.region;
        // Keep original phases unless new ones are better
      }
      setPlan(effectivePlan);
      // Persist plan history to localStorage
      try {
        const _hKey = user?.email?.toLowerCase().replace(/[^a-z0-9]/g,"_") || "anon";
        const history = JSON.parse(
          localStorage.getItem(`physio_plan_history_${_hKey}`) ||
          localStorage.getItem("physio_plan_history") || "[]"
        );
        const currentDay = intakeData._dayOverride || dayNum;
        // If this is Day 1 (fresh start, no override), reset streak history
        if (!intakeData._dayOverride || currentDay === 1) {
          localStorage.removeItem("physio_checkin_history");
          localStorage.removeItem("physio_pain_history");
          localStorage.removeItem("physio_last_checkin");
        }
        // Use checkin pain if available (day 2+), otherwise use intake pain (day 1)
        const entryPain = (checkIn && typeof checkIn.pain === "number") ? checkIn.pain : (Number(intakeData?.pain)||0);
        // Clean title — remove AI-added day/phase suffixes
        const cleanTitle = (parsed.title||"").replace(/[\s\-–—]+day\s*\d+/gi,"").replace(/[\s\-–—]+phase\s*\d+/gi,"").trim();
        const generatedDate = new Date().toISOString().split("T")[0];
        parsed._generatedDate = generatedDate;
        const entry = {
          id: Date.now(), title: cleanTitle, region: parsed.region,
          day: currentDay, date: new Date().toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"}),
          pain: entryPain, progress: Math.min(100, Math.round((currentDay/7)*100)),
          plan: parsed, intake_data: intakeData,
        };
        // Merge with current planHistory state to avoid losing entries
        const stateIds = new Set(planHistory.map(p => p.id));
        const merged = [entry, ...planHistory.filter(p => p.id !== entry.id), ...history.filter(p => !stateIds.has(p.id) && p.id !== entry.id)];
        const trimmed = merged.slice(0, 20);
        const _userKey = user?.email?.toLowerCase().replace(/[^a-z0-9]/g,"_") || "anon";
        localStorage.setItem(`physio_plan_history_${_userKey}`, JSON.stringify(trimmed));
        localStorage.setItem("physio_plan_history", JSON.stringify(trimmed)); // legacy fallback
        setPlanHistory(trimmed);
        // Save to Supabase — only if this day not already saved
        try {
          const _sess = loadSession();
          if (_sess?.token && _sess?.userId) {
            // Check if day already exists to prevent duplicates
            sb.getPlans(_sess.token, _sess.userId).then(existing => {
              const alreadySaved = Array.isArray(existing) && existing.some(p => p.day === currentDay);
              if (!alreadySaved) {
                sb.savePlan(_sess.token, _sess.userId, entry).catch(e => console.warn('Supabase save failed:', e));
              }
            }).catch(() => {
              // Can't check, save anyway
              sb.savePlan(_sess.token, _sess.userId, entry).catch(() => {});
            });
          }
        } catch(e) { console.warn('Supabase save error:', e); }
        // Auto-add intake pain as Day 1 check-in if this is Day 1 (no real check-in yet)
        if (currentDay === 1 || !checkIn) {
          const intakePainVal = Number(intakeData?.pain) || 0;
          if (intakePainVal > 0) {
            setCheckinHistory(prev => {
              const hasDay1 = prev.some(p => p.day === 1);
              if (hasDay1) return prev; // don't overwrite a real check-in
              return [{day:1, pain:intakePainVal, energy:5, date:new Date().toISOString().split("T")[0]}, ...prev]
                .sort((a,b) => a.day - b.day);
            });
          }
        }
        setDashboardTab("plans");
        if (!localStorage.getItem(`physio_tour_done_${_userKey}`)) setShowTour(true);
      } catch {}
      go("plan");
      notifSystem.addInApp("new_plan", `${parsed.title || "Plan"} — Day ${dayNum}`);
    } catch (e) {
      // Roll back — don't change dayNum on failure
      setError(`Could not generate plan: ${e.message}. Please try again.`);
      go("dashboard");
    }
  }

  function handleIntakeComplete(intakeData) {
    const fullIntake = { ...intakeData, ...(safetyData||{}) };
    setIntake(fullIntake);
    if (subscription) { generatePlan(fullIntake); return; }
    go("subscribe");
  }

  function handleAuthSuccess(u) {
    setUser(u);
    notifSystem.requestPermission();
    const adminUser = ADMIN_EMAILS.includes((u.email||"").toLowerCase().trim());
    if (adminUser) setSubscription("admin");
    // Load this user's saved data (keyed by email so different users get different data)
    const userKey = u.email?.toLowerCase().replace(/[^a-z0-9]/g,"_") || "anon";
    let history = [];
    try {
      history = JSON.parse(localStorage.getItem(`physio_plan_history_${userKey}`) || localStorage.getItem("physio_plan_history") || "[]");
      if (!Array.isArray(history)) history = [];
    } catch { history = []; }
    setPlanHistory(history);
    setPlan(history.length > 0 ? (history[0]?.plan || null) : null);
    const sub = localStorage.getItem(`physio_subscription_${userKey}`);
    if (sub && !adminUser) setSubscription(sub); else if (!adminUser) setSubscription(null);
    const trial = localStorage.getItem(`physio_trial_used_${userKey}`);
    setTrialUsed(trial === "true");
    try { localStorage.setItem("physio_current_user", userKey); } catch {}
    // Restore intake from most recent plan
    if (history.length > 0 && history[0]?.intake_data) {
      setIntake(history[0].intake_data);
    }
    // Seed checkinHistory from planHistory pain values
    const seededCheckins = history
      .filter(p => p.day && typeof p.pain === "number")
      .map(p => ({day: p.day, pain: p.pain, energy: 5, date: p.date || ""}))
      .sort((a,b) => a.day - b.day);
    if (seededCheckins.length > 0) setCheckinHistory(seededCheckins);
    // Restore dayNum
    const savedDay = parseInt(localStorage.getItem(`physio_daynum_${userKey}`)||"1", 10);
    const restoredDay = isNaN(savedDay) ? 1 : savedDay;
    setDayNum(restoredDay);
    if (restoredDay <= 1) {
      localStorage.removeItem("physio_checkin_history");
      localStorage.removeItem("physio_pain_history");
      localStorage.removeItem("physio_last_checkin");
    }
    if (u.role === "physiotherapist" || u.role === "clinic_admin") go("clinic");
    else go("dashboard");
  }

  function handlePaid(sub) {
    setSubscription(sub);
    try {
      localStorage.setItem("physio_subscription", sub);
      const _uk = user?.email?.toLowerCase().replace(/[^a-z0-9]/g,"_") || "anon";
      localStorage.setItem(`physio_subscription_${_uk}`, sub);
    } catch {}
    if (sub === "trial") {
      setTrialUsed(true);
      try {
        localStorage.setItem("physio_trial_used", "true");
        const _uk = user?.email?.toLowerCase().replace(/[^a-z0-9]/g,"_") || "anon";
        localStorage.setItem(`physio_trial_used_${_uk}`, "true");
      } catch {}
    }
    // Reset plan data for fresh start
    setPlanHistory([]);
    setPlan(null);
    setIntake(null);
    setDayNum(1);
    setCheckinHistory([]);
    // Clear Supabase plans for fresh start
    const _sess3 = loadSession();
    if (_sess3?.token && _sess3?.userId) {
      sb.deletePlans(_sess3.token, _sess3.userId).catch(() => {});
    }
    // Go to disclaimer first, then quiz
    go("disclaimer");
  }

  function handleCheckIn(ci) {
    // Trial = 1 day only — redirect to subscribe
    if (subscription === "trial" && dayNum >= 1) {
      go("subscribe");
      return;
    }
    // Standard plan — max 7 days
    if (subscription === "standard" && dayNum >= 7) {
      go("dashboard");
      return;
    }
    // Premium plan — check 7-day window from first plan date
    if (subscription === "premium") {
      const firstPlan = planHistory.length > 0 ? planHistory[planHistory.length-1] : null;
      if (firstPlan?.date) {
        const firstDate = new Date(firstPlan.date);
        const today = new Date();
        const daysDiff = Math.floor((today - firstDate) / (1000*60*60*24));
        if (daysDiff >= 7) {
          setError("Your 7-day premium window has expired. Subscribe again to continue.");
          go("subscribe");
          return;
        }
      }
      if (dayNum >= 7) { go("dashboard"); return; }
    }
    const nextDay = dayNum + 1;
    // NOTE: Do NOT increment dayNum here — only increment after successful generation
    const activeIntake = intake ||
      (planHistory.length > 0 ? planHistory[0]?.intake_data || planHistory[planHistory.length-1]?.intake_data : null) ||
      (() => {
        try {
          const userKey = user?.email?.toLowerCase().replace(/[^a-z0-9]/g,"_") || "anon";
          const history = JSON.parse(localStorage.getItem("physio_plan_history_" + userKey) || "[]");
          return history[0]?.intake_data || null;
        } catch { return null; }
      })();
    if (activeIntake) {
      // Save check-in pain to checkinHistory immediately
      if (ci && typeof ci.pain === "number") {
        const todayKey = new Date().toISOString().split("T")[0];
        const entry = {day: dayNum, pain: Number(ci.pain), energy: Number(ci.energy||5), date: todayKey};
        setCheckinHistory(prev => {
          const filtered = prev.filter(p => p.day !== dayNum);
          return [...filtered, entry].sort((a,b) => a.day - b.day);
        });
        // Save checkin to Supabase
        try {
          const _sess = loadSession();
          if (_sess?.token && _sess?.userId) {
            sb.saveCheckin(_sess.token, _sess.userId, entry).catch(()=>{});
          }
        } catch {}
      }
      generatePlan({ ...activeIntake, _dayOverride: nextDay }, ci);
    } else {
      go("quiz");
    }
  }

  function reset() {
    setPlan(null); setIntake(null); setDayNum(1);
    setSubscription(null); setPlanHistory([]); setTrialUsed(false);
    setUser(null); setSafetyData(null);
    clearSession();
    try {
      localStorage.removeItem("physio_subscription");
      localStorage.removeItem("physio_plan_history");
    } catch {}
    go("home");
  }

      {screen === "how_it_works" && <HowItWorksScreen onBack={() => go("home")} onStart={() => go(user ? "subscribe" : "login")} lang={lang} />}
      {screen === "pricing"      && <PricingScreen    onBack={() => go("home")} onStart={() => go(user ? "subscribe" : "login")} lang={lang} />}
      {screen === "coming_soon"  && <ComingSoonScreen onBack={() => go("home")} lang={lang} />}
      {screen === "testimonials" && <TestimonialsScreen onBack={() => go("home")} onStart={() => go(user?"subscribe":"login")} lang={lang}/>}
      {screen === "login"     && <AuthScreen      mode="login"  onSuccess={handleAuthSuccess} lang={lang} />}
      {screen === "signup"    && <AuthScreen      mode="signup" onSuccess={handleAuthSuccess} lang={lang} />}
      {screen === "disclaimer"  && <DisclaimerScreen onAccept={(safety)=>{ setSafetyData(safety); go("quiz"); }} onBack={()=>go("dashboard")} lang={lang}/>}
      {screen === "quiz"      && <QuizScreen      onComplete={handleIntakeComplete} lang={lang} />}
      {screen === "subscribe" && <SubscribeScreen onPaid={handlePaid} user={user} onLogin={() => go("login")} onBack={() => go(user ? "dashboard" : "home")} lang={lang} trialUsed={trialUsed} />}
      {screen === "loading"   && <LoadingScreen   lang={lang} dayNum={dayNum} />}
      {screen === "plan"      && (
        <PlanScreen
          plan={plan} dayNum={dayNum} subscription={subscription} lang={lang}
          onReset={reset}
          onBack={() => go("dashboard")}
          onCheckIn={handleCheckIn}
          onSaveCheckin={entry=>setCheckinHistory(prev=>{const f=prev.filter(p=>p.day!==entry.day);return [...f,entry].sort((a,b)=>a.day-b.day);})}
          onExportPDF={() => exportPDF(plan, dayNum, subscription, user?.name || "")}
        />
      )}
      {screen === "dashboard" && showTour && (
        <OnboardingTour lang={lang} onDone={()=>{ setShowTour(false); try{localStorage.setItem("physio_tour_done","1");}catch{} }}/>
      )}
      {screen === "dashboard" && (
        <DashboardScreen
          user={user} plan={plan} dayNum={dayNum} lang={lang} notifSystem={notifSystem}
          planHistory={planHistory} checkinHistory={checkinHistory} initialTab={dashboardTab}
          onSaveCheckin={entry=>setCheckinHistory(prev=>{const f=prev.filter(p=>p.day!==entry.day);return [...f,entry].sort((a,b)=>a.day-b.day);})}
          onStartPlan={() => {
          // Reset for a new programme — go to subscribe first
          setDayNum(1);
          setCheckinHistory([]);
          setPlan(null);
          setIntake(null);
          // For premium users starting a new body area, keep existing plans
          if (subscription !== "standard" && subscription !== "premium") {
            setPlanHistory([]);
            try {
              const uk = user?.email?.toLowerCase().replace(/[^a-z0-9]/g,"_")||"anon";
              localStorage.removeItem(`physio_daynum_${uk}`);
              localStorage.removeItem(`physio_plan_history_${uk}`);
              const _sess = loadSession();
              if (_sess?.token && _sess?.userId) {
                sb.deletePlans(_sess.token, _sess.userId).catch(()=>{});
              }
            } catch {}
          }
          go("subscribe");
        }}
          onCheckIn={handleCheckIn}
          onViewPlan={() => plan && go("plan")}
          onExportPDF={() => plan && exportPDF(plan, dayNum, subscription, user?.name || "")}
          onLogout={async () => {
              const session = loadSession();
              if (session?.token) { try { await sb.signOut(session.token); } catch {} }
              clearSession();
              // Clear state
              setUser(null); setSubscription(null); setPlan(null);
              setPlanHistory([]); setIntake(null); setDayNum(1); setTrialUsed(false);
              go("home");
            }}
        />
      )}
      {screen === "clinic" && (
        <ClinicDashboard
          user={user}
          onBack={() => go("home")}
          onLogout={() => { setUser(null); go("home"); }}
        />
      )}

      {error && (
        <div style={{ position:"fixed", bottom:20, right:20, left:20, maxWidth:380, margin:"0 auto", background:T.redPale, border:`1px solid ${T.red}28`, borderRadius:10, padding:"13px 16px", fontSize:14, color:T.red, zIndex:999, boxShadow:"0 4px 20px rgba(0,0,0,.1)", display:"flex", gap:10, alignItems:"flex-start", animation:"scaleIn .3s ease" }}>
          <span style={{ flex:1, lineHeight:1.5 }}>{error}</span>
          <button onClick={() => setError("")} style={{ background:"none", border:"none", cursor:"pointer", color:T.red, fontWeight:700, fontSize:16, padding:0, flexShrink:0 }}>✕</button>
        </div>
      )}

      {toastNotif && (
        <NotifToast notif={toastNotif} onDismiss={() => setToastNotif(null)} />
      )}
    </div>
  );
}

const rootEl=document.getElementById("root");
const root=ReactDOM.createRoot(rootEl);
root.render(React.createElement(App));

</script>
<script>
// Hide loading only after React has mounted
window.__appReady = function() {
  var l = document.getElementById("loading");
  if (l) { l.style.opacity="0"; l.style.transition="opacity .3s"; setTimeout(function(){l.style.display="none";},300); }
};
// Fallback: hide after 15 seconds max
setTimeout(function(){window.__appReady&&window.__appReady();}, 15000);
</script>
</body>
</html>
