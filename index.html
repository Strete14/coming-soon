<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <title>Coming Soon</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #ffffff; /* păstrăm fundalul */
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    .container {
      text-align: center;
    }

    .logo {
      width: 200px;
      max-width: 80%;
      opacity: 0;
      animation: fadeIn 1.5s ease forwards, fadeOut 1.5s ease 3s forwards;
    }

    .coming-soon {
      font-size: 28px;
      color: #000;
      opacity: 0;
      position: absolute;
      animation: fadeIn 1.5s ease 4.5s forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes fadeOut {
      from { opacity: 1; }
      to { opacity: 0; }
    }
  </style>
</head>
<body>

  <div class="container">
    <img src="logo.svg" alt="Logo" class="logo">
    <div class="coming-soon">Coming Soon</div>
  </div>

</body>
</html>
