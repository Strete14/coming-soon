<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <title>Coming Soon</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      background: #111; /* fundal neutru, nu mai apare alb */
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
    }

    .container {
      position: relative;
      width: 100%;
      height: 100%;
    }

    /* LOGO FULLSCREEN */
    .logo {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.85);
      width: 90vw;
      max-height: 90vh;

      opacity: 0;
      filter: blur(12px);

      animation:
        logoFadeIn 3.5s ease forwards,
        logoStay 4s ease 3.5s forwards,
        logoFadeOut 3.5s ease 7.5s forwards;
    }

    @keyframes logoFadeIn {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.85);
        filter: blur(12px);
      }
      100% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
        filter: blur(0);
      }
    }

    @keyframes logoStay {
      from { opacity: 1; }
      to { opacity: 1; }
    }

    @keyframes logoFadeOut {
      0% {
        opacity: 1;
        filter: blur(0);
      }
      100% {
        opacity: 0;
        filter: blur(20px);
      }
    }

    /* TEXT COMING SOON */
    .coming-soon {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      
      font-size: 42px;
      color: #ffffff;
      letter-spacing: 3px;

      opacity: 0;
      white-space: nowrap;
      overflow: hidden;
      border-right: 2px solid white;

      width: 0;

      animation:
        textFadeIn 2s ease 11s forwards,
        typing 4s steps(12) 12s forwards,
        blink 1s infinite 12s;
    }

    @keyframes textFadeIn {
      to { opacity: 1; }
    }

    @keyframes typing {
      from { width: 0; }
      to { width: 12ch; }
    }

    @keyframes blink {
      50% { border-color: transparent; }
    }

  </style>
</head>
<body>

  <div class="container">
    <img src="logo.svg" alt="Logo" class="logo">
    <div class="coming-soon">Coming Soon</div>
  </div>

</body>
</html>
