// Lightweight Supabase auth client (no SDK needed — uses REST + JS fetch)
const sb = {
  // ── Auth ──────────────────────────────────────────────────────
  async signUp(email, password, name, role) {
    const r = await fetch(`${SUPABASE_URL}/auth/v1/signup`, {
      method: "POST",
      headers: { "Content-Type": "application/json", apikey: SUPABASE_ANON },
      body: JSON.stringify({ email, password, data: { name, role } }),
    });
    return r.json();
  },
  async signIn(email, password) {
    const r = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
      method: "POST",
      headers: { "Content-Type": "application/json", apikey: SUPABASE_ANON },
      body: JSON.stringify({ email, password }),
    });
    return r.json();
  },
  async signOut(token) {
    await fetch(`${SUPABASE_URL}/auth/v1/logout`, {
      method: "POST",
      headers: { "Content-Type": "application/json", apikey: SUPABASE_ANON, Authorization: `Bearer ${token}` },
    });
  },
  async resetPassword(email) {
    const r = await fetch(`${SUPABASE_URL}/auth/v1/recover`, {
      method: "POST",
      headers: { "Content-Type": "application/json", apikey: SUPABASE_ANON },
      body: JSON.stringify({ email }),
    });
    return r.json();
  },
  async refreshToken(refresh_token) {
    const r = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=refresh_token`, {
      method: "POST",
      headers: { "Content-Type": "application/json", apikey: SUPABASE_ANON },
      body: JSON.stringify({ refresh_token }),
    });
    return r.json();
  },
  // ── DB ────────────────────────────────────────────────────────
  async upsertProfile(token, id, data) {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/users?id=eq.${id}`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        apikey: SUPABASE_ANON,
        Authorization: `Bearer ${token}`,
        Prefer: "resolution=merge-duplicates",
      },
      body: JSON.stringify({ id, ...data }),
    });
    return r.status;
  },
  async getProfile(token, id) {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/users?id=eq.${id}&select=*`, {
      headers: { apikey: SUPABASE_ANON, Authorization: `Bearer ${token}` },
    });
    const data = await r.json();
    return Array.isArray(data) ? data[0] : null;
  },
  async savePlan(token, userId, entry) {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/plans`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        apikey: SUPABASE_ANON,
        Authorization: `Bearer ${token}`,
        Prefer: "return=representation",
      },
      body: JSON.stringify({
        user_id: userId,
        day: entry.day || 1,
        title: entry.title || "",
        region: entry.region || "",
        pain: entry.pain || 0,
        progress: entry.progress || 0,
        plan_data: entry.plan || entry,
        intake_data: entry.intake_data || null,
      }),
    });
    return r.json();
  },
  async getPlans(token, userId) {
    const r = await fetch(
      `${SUPABASE_URL}/rest/v1/plans?user_id=eq.${userId}&order=created_at.desc&limit=20`,
      { headers: { apikey: SUPABASE_ANON, Authorization: `Bearer ${token}` } }
    );
    return r.json();
  },
  async savePlan(token, userId, entry) {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/plans`, {
      method: "POST",
      headers: {
        apikey: SUPABASE_ANON, Authorization: `Bearer ${token}`,
        "Content-Type": "application/json", Prefer: "return=representation"
      },
      body: JSON.stringify({
        user_id: userId,
        day: entry.day,
        title: entry.title,
        region: entry.region,
        pain: entry.pain,
        progress: entry.progress,
        plan_data: entry.plan,
        intake_data: entry.intake_data,
      })
    });
    return r.json();
  },
  async saveCheckin(token, userId, entry) {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/checkins`, {
      method: "POST",
      headers: {
        apikey: SUPABASE_ANON, Authorization: `Bearer ${token}`,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        user_id: userId, day: entry.day, pain: entry.pain,
        energy: entry.energy, notes: entry.notes||"", check_date: entry.date
      })
    });
    return r.json();
  },
  async deletePlans(token, userId) {
    await fetch(`${SUPABASE_URL}/rest/v1/plans?user_id=eq.${userId}`, {
      method: "DELETE",
      headers: { apikey: SUPABASE_ANON, Authorization: `Bearer ${token}` }
    });
  },
};

// ── Session helpers ──────────────────────────────────────────────────────────
const SESSION_KEY = "physio_session";
function loadSession() {
  try { return JSON.parse(localStorage.getItem(SESSION_KEY)); } catch { return null; }
}
function saveSession(session) {
  try { localStorage.setItem(SESSION_KEY, JSON.stringify(session)); } catch {}
}
function clearSession() {
  try { localStorage.removeItem(SESSION_KEY); } catch {}
}

// EXERCISE ANIMATIONS — BLACK LINE ART ON WHITE
// Style: Spotebi reference — thin black strokes, white background,
// no colour fills, anatomically accurate, smooth looping
// ═══════════════════════════════════════════════════════════════

const EXERCISE_CSS = `
  @keyframes legUp     { 0%,100%{transform:rotate(0deg)}   45%,55%{transform:rotate(-44deg)} }
  @keyframes legDown   { 0%,100%{transform:rotate(0deg)}   45%,55%{transform:rotate(36deg)} }
  @keyframes hipUp     { 0%,100%{transform:translateY(0)}  45%,55%{transform:translateY(-22px)} }
  @keyframes clamUp    { 0%,100%{transform:rotate(0deg)}   45%,55%{transform:rotate(-40deg)} }
  @keyframes armFwd    { 0%,100%{transform:rotate(0deg)}   45%,55%{transform:rotate(-62deg)} }
  @keyframes armOut    { 0%,100%{transform:rotate(0deg)}   45%,55%{transform:rotate(-50deg)} }
  @keyframes armIn     { 0%,100%{transform:rotate(0deg)}   45%,55%{transform:rotate(50deg)} }
  @keyframes armUp     { 0%,100%{transform:rotate(0deg)}   45%,55%{transform:rotate(-80deg)} }
  @keyframes foreArm   { 0%,100%{transform:rotate(0deg)}   45%,55%{transform:rotate(-70deg)} }
  @keyframes foreArmUp { 0%,100%{transform:rotate(80deg)}  45%,55%{transform:rotate(10deg)} }
  @keyframes legBack   { 0%,100%{transform:rotate(0deg)}   45%,55%{transform:rotate(-28deg)} }
  @keyframes spineArc  { 0%,100%{transform:translateY(0) scaleY(1)} 45%,55%{transform:translateY(-6px) scaleY(1.06)} }
  @keyframes heelRise  { 0%,100%{transform:translateY(0)}  45%,55%{transform:translateY(-15px)} }
  @keyframes pendSwing { 0%{transform:rotate(-26deg)} 50%{transform:rotate(26deg)} 100%{transform:rotate(-26deg)} }
  @keyframes neckTuck  { 0%,100%{transform:translateX(0)}  45%,55%{transform:translateX(-9px)} }
  @keyframes neckTilt  { 0%,100%{transform:rotate(0deg)}   45%,55%{transform:rotate(20deg)} }
  @keyframes neckRot   { 0%,100%{transform:scaleX(1)}      45%,55%{transform:scaleX(0.6)} }
  @keyframes rowPull   { 0%,100%{transform:translateX(0)}  45%,55%{transform:translateX(-18px)} }
  @keyframes bodyLean  { 0%,100%{transform:rotate(0deg)}   45%,55%{transform:rotate(-10deg)} }
  @keyframes squatDown { 0%,100%{transform:translateY(0)}  45%,55%{transform:translateY(20px)} }
  @keyframes kneeExt   { 0%,100%{transform:rotate(48deg)}  45%,55%{transform:rotate(4deg)} }

`;

// ── Shared stroke constants ───────────────────────────────────
const SW  = 2.2;   // standard stroke width
const SW2 = 3.0;   // thick (torso/thighs)
const SW3 = 1.6;   // fine (fingers, face)
const BK  = "#1a1a1a";  // near-black
const WH  = "#ffffff";  // white fill
const D   = 2.4;        // animation duration (seconds)

// ── Shared body-part components ───────────────────────────────

// Head + ponytail (front view)
const HeadF = ({cx=130,cy=80,r=18}) => (
  <g>
    <ellipse cx={cx} cy={cy} rx={r} ry={r*1.06} fill={WH} stroke={BK} strokeWidth={SW}/>
    {/* hair top */}
    <path d={`M${cx-r+2} ${cy-r*0.4} Q${cx} ${cy-r*1.6} ${cx+r-2} ${cy-r*0.4}`} fill={WH} stroke={BK} strokeWidth={SW}/>
    {/* ponytail */}
    <path d={`M${cx+r*0.55} ${cy-r*0.6} Q${cx+r*1.1} ${cy} ${cx+r*0.8} ${cy+r*0.5}`} fill="none" stroke={BK} strokeWidth={SW}/>
    {/* neck */}
    <rect x={cx-6} y={cy+r-2} width={12} height={12} rx={4} fill={WH} stroke={BK} strokeWidth={SW}/>
  </g>
);

// Head + ponytail (side/profile — facing right)
const HeadS = ({cx=80,cy=80,r=18}) => (
  <g>
    <ellipse cx={cx} cy={cy} rx={r*0.88} ry={r} fill={WH} stroke={BK} strokeWidth={SW}/>
    {/* hair */}
    <path d={`M${cx-r*0.5} ${cy-r*0.9} Q${cx+r*0.6} ${cy-r*1.4} ${cx+r*0.6} ${cy-r*0.2}`} fill={WH} stroke={BK} strokeWidth={SW}/>
    {/* ponytail going back */}
    <path d={`M${cx-r*0.4} ${cy-r*0.5} Q${cx-r*1.4} ${cy+r*0.2} ${cx-r*1.1} ${cy+r*0.85}`} fill="none" stroke={BK} strokeWidth={SW}/>
    {/* neck */}
    <rect x={cx+r*0.2} y={cy+r*0.85} width={10} height={12} rx={4} fill={WH} stroke={BK} strokeWidth={SW}/>
  </g>
);

// Sports bra (front)
const BraF = ({cx=130,y=100,w=36,h=22}) => (
  <g>
    <path d={`M${cx-w/2} ${y+4} Q${cx-w/2+4} ${y} ${cx} ${y+2} Q${cx+w/2-4} ${y} ${cx+w/2} ${y+4} L${cx+w/2} ${y+h} Q${cx} ${y+h+4} ${cx-w/2} ${y+h} Z`} fill={WH} stroke={BK} strokeWidth={SW}/>
    {/* straps */}
    <line x1={cx-w/2+6} y1={y} x2={cx-w/2+4} y2={y-10} stroke={BK} strokeWidth={SW}/>
    <line x1={cx+w/2-6} y1={y} x2={cx+w/2-4} y2={y-10} stroke={BK} strokeWidth={SW}/>
    {/* midriff */}
    <path d={`M${cx-w/2} ${y+h} Q${cx} ${y+h+4} ${cx+w/2} ${y+h} L${cx+w/2} ${y+h+18} Q${cx} ${y+h+22} ${cx-w/2} ${y+h+18} Z`} fill={WH} stroke={BK} strokeWidth={SW}/>
  </g>
);

// Sports bra (side profile facing right)
const BraS = ({x=72,y=108,w=28,h=40}) => (
  <g>

    <line x1={x+w*0.55} y1={y} x2={x+w*0.6} y2={y-10} stroke={BK} strokeWidth={SW}/>

);

// Shorts (front)

  const f = flip ? -1 : 1;
  return (
    <g>
      <path d={`M${x} ${y} Q${x+f*6} ${y+4} ${x+f*22} ${y+8} Q${x+f*26} ${y+12} ${x+f*22} ${y+14} L${x-f*4} ${y+14} Q${x-f*8} ${y+10} ${x-f*6} ${y} Z`} fill={WH} stroke={BK} strokeWidth={SW}/>
      <line x1={x+f*2} y1={y+5} x2={x+f*16} y2={y+7} stroke={BK} strokeWidth={SW3}/>
    </g>
  );
};

// Shared stroke constants
const SF = 2.0;   // standard stroke
const SF2 = 2.8;  // thick (limbs)
const SF3 = 1.4;  // fine detail
const BK2 = "#1a1a1a";
const WH2 = "#ffffff";

// Shared primitives
const F_HeadF = ({cx,cy,r=18}) => (
  <g>
    <ellipse cx={cx} cy={cy} rx={r} ry={r*1.05} fill={WH2} stroke={BK2} strokeWidth={SF}/>
    <ellipse cx={cx} cy={cy-r*0.52} rx={r*0.88} ry={r*0.5} fill={BK2}/>
    <line x1={cx+r*0.55} y1={cy-r*0.35} x2={cx+r*0.6} y2={cy+r*0.6} stroke={BK2} strokeWidth={4} strokeLinecap="round"/>
    <rect x={cx-6} y={cy+r-2} width={12} height={12} rx={4} fill={WH2} stroke={BK2} strokeWidth={SF}/>
  </g>
);
const F_HeadS = ({cx,cy,r=18,flip=false}) => {
  const d = flip ? -1 : 1;
  return (
    <g>
      <ellipse cx={cx} cy={cy} rx={r*0.88} ry={r} fill={WH2} stroke={BK2} strokeWidth={SF}/>
      <ellipse cx={cx-d*3} cy={cy-r*0.52} rx={r*0.82} ry={r*0.5} fill={BK2}/>
      <path d={`M${cx-d*r*0.4} ${cy-r*0.5} Q${cx-d*r*1.4} ${cy+r*0.2} ${cx-d*r*1.1} ${cy+r*0.85}`} fill="none" stroke={BK2} strokeWidth={5} strokeLinecap="round"/>
      <rect x={cx+d*r*0.15} y={cy+r*0.82} width={10} height={12} rx={4} fill={WH2} stroke={BK2} strokeWidth={SF}/>
    </g>
  );
};
const F_Shoe = ({x,y,flip=false}) => {
  const d = flip ? -1 : 1;
  return (
    <g>
      <path d={`M${x} ${y} Q${x+d*6} ${y+4} ${x+d*22} ${y+8} Q${x+d*26} ${y+12} ${x+d*20} ${y+14} L${x-d*4} ${y+14} Q${x-d*8} ${y+10} ${x-d*6} ${y} Z`} fill={WH2} stroke={BK2} strokeWidth={SF}/>
      <line x1={x+d*2} y1={y+5} x2={x+d*16} y2={y+7} stroke={BK2} strokeWidth={SF3}/>
    </g>
  );
};
const F_Mat = ({x=10,y=185,w=200}) => <rect x={x} y={y} width={w} height={6} rx={3} fill="#efefef" stroke={BK2} strokeWidth={SF3}/>;
const F_Bra = ({cx,y,w=34,h=20}) => (
  <g>
    <path d={`M${cx-w/2} ${y+3} Q${cx} ${y-2} ${cx+w/2} ${y+3} L${cx+w/2} ${y+h} Q${cx} ${y+h+3} ${cx-w/2} ${y+h} Z`} fill={WH2} stroke={BK2} strokeWidth={SF}/>
    <line x1={cx-w/2+7} y1={y} x2={cx-w/2+5} y2={y-10} stroke={BK2} strokeWidth={SF}/>
    <line x1={cx+w/2-7} y1={y} x2={cx+w/2-5} y2={y-10} stroke={BK2} strokeWidth={SF}/>
    <path d={`M${cx-w/2} ${y+h} Q${cx} ${y+h+3} ${cx+w/2} ${y+h} L${cx+w/2} ${y+h+16} Q${cx} ${y+h+19} ${cx-w/2} ${y+h+16} Z`} fill={WH2} stroke={BK2} strokeWidth={SF}/>
  </g>
);
const F_Shorts = ({cx,y,w=42,h=34}) => (
  <g>
    <path d={`M${cx-w/2} ${y} Q${cx} ${y-4} ${cx+w/2} ${y} L${cx+w/2} ${y+h} Q${cx+5} ${y+h+3} ${cx} ${y+h} Q${cx-5} ${y+h+3} ${cx-w/2} ${y+h} Z`} fill={WH2} stroke={BK2} strokeWidth={SF2}/>
    <line x1={cx} y1={y} x2={cx} y2={y+h} stroke={BK2} strokeWidth={SF3}/>
    <line x1={cx-w/2} y1={y+5} x2={cx+w/2} y2={y+5} stroke={BK2} strokeWidth={SF3}/>
  </g>
);
// Standing figure helper
const F_Stand = ({cx,legGap=12,armAngle=30}) => {
  const al = armAngle * Math.PI/180;
  return (
    <g>
      <line x1={cx-legGap} y1={175} x2={cx-legGap-4} y2={270} stroke={BK2} strokeWidth={SF2} strokeLinecap="round"/>
      <line x1={cx+legGap} y1={175} x2={cx+legGap+4} y2={270} stroke={BK2} strokeWidth={SF2} strokeLinecap="round"/>
      <F_Shoe x={cx-legGap-18} y={266} flip={true}/>
      <F_Shoe x={cx+legGap-4} y={266}/>
      <line x1={cx-18} y1={115} x2={cx-18-Math.sin(al)*46} y2={115+Math.cos(al)*46} stroke={BK2} strokeWidth={SF} strokeLinecap="round"/>
      <ellipse cx={cx-18-Math.sin(al)*54} cy={115+Math.cos(al)*54} rx={7} ry={4} fill={WH2} stroke={BK2} strokeWidth={SF3}/>
      <line x1={cx+18} y1={115} x2={cx+18+Math.sin(al)*46} y2={115+Math.cos(al)*46} stroke={BK2} strokeWidth={SF} strokeLinecap="round"/>
      <ellipse cx={cx+18+Math.sin(al)*54} cy={115+Math.cos(al)*54} rx={7} ry={4} fill={WH2} stroke={BK2} strokeWidth={SF3}/>
    </g>
  );
};

function Spinner({size=36,color=T.teal}) {
  return (
    <div style={{position:"relative",width:size,height:size,flexShrink:0}}>
      <div style={{position:"absolute",inset:0,border:`2.5px solid ${T.grey100}`,borderTop:`2.5px solid ${color}`,borderRadius:"50%",animation:"spin .85s linear infinite"}}/>
    </div>
  );
}

function useReveal(threshold=0.12) {
  const ref=useRef(); const [vis,setVis]=useState(false);
  useEffect(()=>{
    const o=new IntersectionObserver(([e])=>{if(e.isIntersecting){setVis(true);o.disconnect();}},{threshold});
    if(ref.current)o.observe(ref.current);
    return()=>o.disconnect();
  },[]);
  return [ref,vis];
}
function Reveal({children,delay=0,style={}}) {
  const [ref,vis]=useReveal();
  return <div ref={ref} style={{opacity:vis?1:0,transform:vis?"translateY(0)":"translateY(16px)",transition:`opacity .5s ease ${delay}s,transform .5s ease ${delay}s`,...style}}>{children}</div>;
}
function SL({children}) {

    <div style={{display:"flex",alignItems:"center",gap:9,marginBottom:13}}>
      <div style={{width:16,height:1.5,background:T.teal}}/>

    </div>
  );
}

function Nav({screen,user,lang,setLang,onNav,notifSystem}) {
  const t=useT(lang);
  const [scrolled,setScrolled]=useState(false);
  const [langOpen,setLangOpen]=useState(false);
  const [menuOpen,setMenuOpen]=useState(false);
  useEffect(()=>{
    const fn=()=>setScrolled(window.scrollY>30);
    window.addEventListener("scroll",fn);
    return()=>window.removeEventListener("scroll",fn);
  },[]);
  useEffect(()=>{setMenuOpen(false);},[screen]);
  useEffect(()=>{
    if (!langOpen) return;
    const fn = e => {
      // Close if click is outside the language button container
      const target = e.target;
      if (!target.closest('.lang-selector')) setLangOpen(false);
    };
    document.addEventListener('mousedown', fn);
    document.addEventListener('touchstart', fn);
    return () => {
      document.removeEventListener('mousedown', fn);
      document.removeEventListener('touchstart', fn);
    };
  }, [langOpen]);
  const solid=scrolled||screen!=="home";
  return (
    <>
      <nav style={{position:"fixed",top:0,left:0,right:0,zIndex:200,height:62,background:solid?"rgba(255,255,255,.97)":"transparent",backdropFilter:solid?"blur(14px)":"none",borderBottom:solid?`1px solid ${T.grey100}`:"1px solid transparent",transition:"all .3s",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 clamp(14px,4vw,48px)"}}>
        <button onClick={()=>onNav("home")} style={{background:"none",border:"none",cursor:"pointer",display:"flex",alignItems:"center",gap:9,WebkitTapHighlightColor:"transparent"}}>
          <LogoFull size={32}/>
        </button>
        <div style={{display:"flex",alignItems:"center",gap:26,fontSize:14,fontWeight:500,color:T.grey600}} className="desktop-only">
          {[
            {label:t.howItWorks,   nav:"how_it_works"},
            {label:"Reviews",        nav:"testimonials"},
            {label:t.forClinics,     nav:"coming_soon"},
            {label:t.pricing,        nav:"pricing"},
          ].map(({label,nav})=>(
            <button key={nav} onClick={()=>onNav(nav)} style={{background:"none",border:"none",cursor:"pointer",color:T.grey600,fontSize:14,fontWeight:500,fontFamily:"'DM Sans',sans-serif",padding:"2px 0",borderBottom:"1.5px solid transparent",transition:"all .18s"}} onMouseOver={e=>{e.target.style.color=T.navy;e.target.style.borderBottomColor=T.teal;}} onMouseOut={e=>{e.target.style.color=T.grey600;e.target.style.borderBottomColor="transparent";}}>{label}</button>
          ))}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:9}}>
          <div className="lang-selector" style={{position:"relative"}}>
            <button onClick={()=>setLangOpen(!langOpen)} style={{background:"none",border:`1px solid ${T.grey200}`,borderRadius:8,padding:"0 12px",cursor:"pointer",...mono,fontSize:12,color:T.grey600,display:"flex",alignItems:"center",gap:6,WebkitTapHighlightColor:"transparent",width:38,height:38,justifyContent:"center"}}>
              <span style={{fontSize:14}}>{LANGS.find(l=>l.c===lang)?.f}</span>
            </button>
            {langOpen&&(
              <div style={{position:"absolute",right:0,top:"calc(100% + 6px)",background:T.white,border:`1px solid ${T.grey100}`,borderRadius:9,overflow:"hidden",boxShadow:"0 8px 28px rgba(0,0,0,.09)",minWidth:100,zIndex:300}}>
                {LANGS.map(l=>(
                  <button key={l.c} onClick={()=>{setLang(l.c);try{localStorage.setItem("physio_lang",l.c);}catch{}setLangOpen(false);}} style={{display:"flex",width:"100%",alignItems:"center",gap:8,padding:"10px 14px",background:l.c===lang?T.tealPale:"none",border:"none",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontSize:13,color:l.c===lang?T.teal:T.grey600,minHeight:44}}>
                    {l.f} {l.c.toUpperCase()}
                  </button>
                ))}
              </div>
            )}
          </div>
          {/* Notification bell */}
          {notifSystem && <NotificationBell notifSystem={notifSystem}/>}
          <div className="desktop-only" style={{display:"flex",gap:8,alignItems:"center"}}>
            {!user
              ?<><button onClick={()=>onNav("login")} style={{background:"none",border:"none",cursor:"pointer",fontSize:13,color:T.grey600,fontFamily:"'DM Sans',sans-serif",padding:"6px 10px",minHeight:36}}>{t.logIn}</button>
                <button className="btn-teal" onClick={()=>onNav("quiz")} style={{padding:"9px 18px",fontSize:13,minHeight:36}}>{t.startFree}</button></>
              :<button onClick={()=>onNav("dashboard")} style={{display:"flex",alignItems:"center",gap:8,background:T.tealPale,border:`1px solid ${T.tealMid}`,borderRadius:7,padding:"7px 14px",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontSize:13,color:T.teal,fontWeight:500,minHeight:36}}>
                <div style={{width:24,height:24,borderRadius:"50%",background:T.teal,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:T.white,fontWeight:700}}>{user.name?.[0]?.toUpperCase()||"U"}</div>
                {t.goToDashboard}
              </button>
            }
          </div>
          <button onClick={()=>setMenuOpen(!menuOpen)} style={{background:"none",border:`1px solid ${T.grey200}`,borderRadius:8,width:38,height:38,cursor:"pointer",display:"none",flexDirection:"column",gap:4,alignItems:"center",justifyContent:"center",WebkitTapHighlightColor:"transparent"}} className="hamburger">
            <div style={{width:18,height:2,background:T.navy,borderRadius:1,transition:"all .2s",transform:menuOpen?"rotate(45deg) translate(4px,4px)":"none"}}/>
            <div style={{width:18,height:2,background:T.navy,borderRadius:1,opacity:menuOpen?0:1,transition:"all .2s"}}/>
            <div style={{width:18,height:2,background:T.navy,borderRadius:1,transition:"all .2s",transform:menuOpen?"rotate(-45deg) translate(4px,-4px)":"none"}}/>
          </button>
        </div>
      </nav>
      <div className={`mobile-menu${menuOpen?" open":""}`} onClick={e=>e.stopPropagation()}>
        <button onClick={()=>{setMenuOpen(false);onNav("how_it_works");}} style={{background:"none",border:"none",cursor:"pointer",padding:"13px 0",fontSize:16,fontWeight:500,color:T.grey600,textAlign:"left",borderBottom:`1px solid ${T.grey100}`,fontFamily:"'DM Sans',sans-serif",width:"100%"}}>{t.howItWorks}</button>
        <button onClick={()=>{setMenuOpen(false);onNav("coming_soon");}} style={{background:"none",border:"none",cursor:"pointer",padding:"13px 0",fontSize:16,fontWeight:500,color:T.grey600,textAlign:"left",borderBottom:`1px solid ${T.grey100}`,fontFamily:"'DM Sans',sans-serif",width:"100%"}}>{t.forClinics}</button>
        <button onClick={()=>{setMenuOpen(false);onNav("pricing");}} style={{background:"none",border:"none",cursor:"pointer",padding:"13px 0",fontSize:16,fontWeight:500,color:T.grey600,textAlign:"left",borderBottom:`1px solid ${T.grey100}`,fontFamily:"'DM Sans',sans-serif",width:"100%"}}>{t.pricing}</button>
        <div style={{marginTop:20,display:"flex",flexDirection:"column",gap:10}}>
          {!user
            ?<><button className="btn-teal" onClick={()=>{setMenuOpen(false);onNav("quiz");}} style={{width:"100%",justifyContent:"center",fontSize:16,minHeight:52}}>{t.startFreeTrial}</button>
              <button className="btn-outline" onClick={()=>{setMenuOpen(false);onNav("login");}} style={{width:"100%",justifyContent:"center",fontSize:16,minHeight:52}}>{t.logIn}</button></>
            :<button className="btn-teal" onClick={()=>{setMenuOpen(false);onNav("dashboard");}} style={{width:"100%",justifyContent:"center",minHeight:52}}>{t.goToDashboard}</button>
          }
        </div>
      </div>
      <style>{`.desktop-only{display:flex}.hamburger{display:none!important} @media(max-width:768px){.desktop-only{display:none!important}.hamburger{display:flex!important}}`}</style>
    </>
  );
}

  const [resetSent, setResetSent] = useState(false);

  async function handleForgotPassword() {
    if (!f.email) { setErr(t.errEmailFirst); return; }
    if (!supabaseReady) { setResetSent(true); return; }
    setLoading(true);
    try {
      const res = await sb.resetPassword(f.email);
      setLoading(false);
      if (res.error) { setErr(res.error.message || "Could not send reset email."); }
      else { setResetSent(true); setErr(""); }
    } catch { setLoading(false); setErr(t.errConnection); }
  }

  // Check if Supabase is configured with real credentials
  const supabaseReady = SUPABASE_URL && !SUPABASE_URL.includes("YOUR_PROJECT");

  async function submit() {
    setErr("");
    if (!f.email || !f.password) { setErr(t.errFillFields); return; }
    if (mode === "signup" && !f.name) { setErr(t.errNameRequired); return; }
    if (mode === "signup" && f.password.length < 8) { setErr(t.errPassword8); return; }
    setLoading(true);

    // ── Supabase not configured ───────────────────────────────────────────────
    if (!supabaseReady) {
      setLoading(false);
      setErr("Authentication service not configured. Please contact support.");
      return;
    }

    try {
      if (mode === "signup") {
        const res = await sb.signUp(f.email, f.password, f.name, f.role);
        if (res.error) { setErr(res.error.message || t.errSignUpFailed); setLoading(false); return; }
        const session = res.session || res;
        const userId  = res.user?.id || res.id;
        const token   = session?.access_token;
        // Save profile to users table
        if (token && userId) {
          await sb.upsertProfile(token, userId, {
            name: f.name, email: f.email, role: f.role, created_at: new Date().toISOString()
          });
          saveSession({ token, refresh_token: session.refresh_token, userId,
            user: { id: userId, name: f.name, email: f.email, role: f.role } });
        }
        setLoading(false);
        // Email confirmation required — show confirmation screen
        if (!token) {
          setConfirmed(true);
          return;
        }
        // STRICT: must have token to proceed
        if (!userId) {
          setErr(t.errSignUpFailed || "Sign up failed. Please try again.");
          return;
        }
        onSuccess({ id: userId, name: f.name, email: f.email, role: f.role, token });
      } else {
        // Login
        const res = await sb.signIn(f.email, f.password);
        if (res.error) { setErr(res.error.message || t.errLoginFailed); setLoading(false); return; }
        const token  = res.access_token;
        const userId = res.user?.id;
        // STRICT: must have a valid token and userId to proceed
        if (!token || !userId) {
          setErr(t.errLoginFailed || "Login failed. Please check your credentials.");
          setLoading(false);
          return;
        }
        const userMeta = res.user?.user_metadata || {};
        let profile = null;
        try { profile = await sb.getProfile(token, userId); } catch {}
        const userData = {
          id:    userId,
          name:  profile?.name  || userMeta.name  || f.email.split("@")[0],
          email: profile?.email || res.user?.email || f.email,
          role:  profile?.role  || userMeta.role   || "patient",
          token,
        };
        saveSession({ token, refresh_token: res.refresh_token, userId, user: userData });
        setLoading(false);
        onSuccess(userData);
      }
    } catch (e) {
      setLoading(false);
      setErr(t.errConnection);
      console.error("Auth error:", e);
    }
  }

  const features=[
    {text:t.featureAI},
    {text:t.featureLangs},
    {text:t.featurePDF},
    {text:t.featurePrivate},
  ];

  return (
    <div style={{minHeight:"100vh",display:"grid",gridTemplateColumns:"1fr 1fr",fontFamily:"'DM Sans',sans-serif"}}>
      <style>{`@media(max-width:768px){.auth-split-left{display:none!important}.auth-split-right{grid-column:1/-1!important}}`}</style>

      {/* Left panel — brand */}
      <div className="auth-split-left" style={{background:`linear-gradient(160deg,${T.navy} 0%,#0d2d4a 60%,#0a4a3a 100%)`,display:"flex",flexDirection:"column",justifyContent:"space-between",padding:"clamp(32px,5vw,56px)",minHeight:"100vh",position:"relative",overflow:"hidden"}}>
        {/* Background decoration */}
        <div style={{position:"absolute",top:-80,right:-80,width:320,height:320,borderRadius:"50%",background:"rgba(10,126,110,.15)",pointerEvents:"none"}}/>
        <div style={{position:"absolute",bottom:-60,left:-60,width:240,height:240,borderRadius:"50%",background:"rgba(10,126,110,.1)",pointerEvents:"none"}}/>

        {/* Logo */}
        <div><LogoFull size={32} light/></div>

        {/* Middle content */}
        <div>
          <div style={{fontSize:11,letterSpacing:".16em",color:T.teal,textTransform:"uppercase",marginBottom:16,fontFamily:"'DM Mono',monospace"}}>PhysioRoutine</div>
          <h1 style={{fontFamily:"'Fraunces',serif",fontWeight:600,fontSize:"clamp(28px,3.5vw,40px)",color:"#fff",lineHeight:1.18,marginBottom:20}}>
            {t.authHero||"Your personalised rehab journey starts here."}
          </h1>
          <p style={{fontSize:15,color:"rgba(255,255,255,.6)",lineHeight:1.7,marginBottom:36}}>
            {t.authSubHero||"Sign up in seconds. Answer a few questions about your pain. Get a clinically-structured rehabilitation plan generated just for you."}
          </p>
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            {features.map((f,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:12}}>
                <div style={{width:34,height:34,borderRadius:9,background:"rgba(255,255,255,.07)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>{f.icon}</div>
                <div style={{fontSize:14,color:"rgba(255,255,255,.75)"}}>{f.text}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Bottom testimonial */}
        <div style={{borderTop:"1px solid rgba(255,255,255,.1)",paddingTop:24}}>
          <div style={{fontSize:14,color:"rgba(255,255,255,.6)",lineHeight:1.6,fontStyle:"italic",marginBottom:12}}>
            "My knee was aching for months. PhysioRoutine gave me a clear plan and I was back running in 6 weeks."
          </div>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:34,height:34,borderRadius:"50%",background:"rgba(10,126,110,.3)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.7)" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
            </div>
            <div>
              <div style={{fontSize:13,color:"rgba(255,255,255,.85)",fontWeight:500}}>Marco R.</div>
              <div style={{fontSize:11,color:"rgba(255,255,255,.4)",fontFamily:"'DM Mono',monospace"}}>{t.premiumUser} · Italy</div>
            </div>
            <div style={{marginLeft:"auto",display:"flex",gap:2}}>
              {"★★★★★".split("").map((s,i)=><span key={i} style={{color:T.teal,fontSize:13}}>{s}</span>)}
            </div>
          </div>
        </div>
      </div>

      {/* Right panel — form */}
      <div className="auth-split-right" style={{display:"flex",alignItems:"center",justifyContent:"center",background:T.offwhite,padding:"clamp(24px,5vw,56px) clamp(20px,5vw,48px)",minHeight:"100vh"}}>
        <div style={{width:"100%",maxWidth:420,animation:"fadeUp .4s ease"}}>

          {/* Tab switcher */}
          <div style={{display:"flex",background:T.white,borderRadius:12,padding:4,marginBottom:28,border:`1px solid ${T.grey100}`,boxShadow:"0 1px 4px rgba(0,0,0,.04)"}}>
            {[{k:"login",l:t.logIn},{k:"signup",l:t.signUp}].map(tab=>(
              <button key={tab.k} onClick={()=>{setMode(tab.k);setErr("");}}
                style={{flex:1,padding:"10px",borderRadius:9,border:"none",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontSize:14,fontWeight:mode===tab.k?600:400,
                  background:mode===tab.k?T.navy:"transparent",
                  color:mode===tab.k?"#fff":T.grey500,
                  boxShadow:mode===tab.k?"0 2px 8px rgba(15,31,61,.18)":"none",
                  transition:"all .2s"}}>
                {tab.l}
              </button>
            ))}
          </div>

          {/* Greeting */}
          <div style={{marginBottom:24}}>
            <h2 style={{fontFamily:"'Fraunces',serif",fontWeight:600,fontSize:"clamp(20px,3vw,26px)",color:T.navy,marginBottom:4}}>
              {mode==="login"?t.welcomeBack:t.createAccountSub}
            </h2>
            <p style={{fontSize:14,color:T.grey500,margin:0}}>
              {mode==="login"?t.logInSubtitle:t.freeToStart}
            </p>
          </div>

          {/* Error / Success messages */}
          {err&&(
            <div style={{background:"#FEF2F2",border:"1px solid #FECACA",borderRadius:9,padding:"11px 14px",fontSize:13,color:"#DC2626",marginBottom:16,display:"flex",alignItems:"center",gap:8}}>
              {err}
            </div>
          )}
          {resetSent&&!err&&(
            <div style={{background:T.tealPale,border:`1px solid ${T.tealMid}`,borderRadius:9,padding:"11px 14px",fontSize:13,color:T.teal,marginBottom:16,display:"flex",alignItems:"center",gap:8}}>
              {t.passwordResetSent}
            </div>
          )}

          <div style={{display:"flex",flexDirection:"column",gap:16}}>

            {/* Name (signup only) */}
            {mode==="signup"&&(
              <div>
                <label style={{display:"block",fontSize:13,color:T.grey600,marginBottom:7,fontWeight:500}}>{t.fullName}</label>
                <div style={{position:"relative"}}>
                  <svg style={{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)",pointerEvents:"none"}} width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={T.grey400} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
                  </svg>
                  <input style={inp} value={f.name} onChange={set("name")} placeholder={t.yourFullName} onFocus={inpFocus} onBlur={inpBlur}/>
                </div>
              </div>
            )}

            {/* Email */}
            <div>
              <label style={{display:"block",fontSize:13,color:T.grey600,marginBottom:7,fontWeight:500}}>Email</label>
              <div style={{position:"relative"}}>
                <svg style={{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)",pointerEvents:"none"}} width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={T.grey400} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>
              </svg>
                <input style={inp} type="email" value={f.email} onChange={set("email")} placeholder="you@example.com" onFocus={inpFocus} onBlur={inpBlur}/>
              </div>
            </div>

            {/* Password */}
            <div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:7}}>
                <label style={{fontSize:13,color:T.grey600,fontWeight:500}}>{t.password||"Password"}</label>
                {mode==="login"&&<button onClick={handleForgotPassword} style={{background:"none",border:"none",cursor:"pointer",fontSize:12,color:T.teal,fontFamily:"'DM Sans',sans-serif",padding:0}}>{loading?t.sending:t.forgotPassword}</button>}
              </div>
              <div style={{position:"relative"}}>
                <svg style={{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)",pointerEvents:"none"}} width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={T.grey400} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
                <input style={{...inp,paddingRight:44}} type={showPass?"text":"password"} value={f.password} onChange={set("password")}
                  placeholder={mode==="signup"?t.minChars:t.yourPassword}
                  onFocus={inpFocus} onBlur={inpBlur}
                  onKeyDown={e=>e.key==="Enter"&&submit()}/>
                <button onClick={()=>setShowPass(p=>!p)} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",fontSize:16,color:T.grey400,padding:4}}>
                  {showPass
                    ? <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                    : <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                  }
                </button>
              </div>
            </div>

            {/* Role selector (signup only) */}
            {mode==="signup"&&(
              <div>
                <label style={{display:"block",fontSize:13,color:T.grey600,marginBottom:7,fontWeight:500}}>{t.iAmA}</label>
                <div style={{display:"flex",flexDirection:"column",gap:8}}>
                  {ROLES.map(r=>(
                    <button key={r.v} onClick={()=>setF(p=>({...p,role:r.v}))}
                      style={{display:"flex",alignItems:"center",gap:12,padding:"11px 14px",borderRadius:10,border:`1.5px solid ${f.role===r.v?T.teal:T.grey100}`,background:f.role===r.v?T.tealPale:T.white,cursor:"pointer",textAlign:"left",transition:"all .18s",fontFamily:"'DM Sans',sans-serif"}}>
                      <span style={{fontSize:20,flexShrink:0}}>{r.icon}</span>
                      <div style={{flex:1}}>
                        <div style={{fontSize:14,fontWeight:600,color:f.role===r.v?T.teal:T.navy}}>{r.label}</div>
                        <div style={{fontSize:12,color:T.grey400,marginTop:1}}>{r.sub}</div>
                      </div>
                      <div style={{width:18,height:18,borderRadius:"50%",border:`2px solid ${f.role===r.v?T.teal:T.grey200}`,background:f.role===r.v?T.teal:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                        {f.role===r.v&&<div style={{width:6,height:6,borderRadius:"50%",background:"#fff"}}/>}
                      </div>
                    </button>
                  ))}
                </div>
              </div>
            )}

            {/* Submit */}
            <button onClick={submit} disabled={loading}
              style={{background:loading?T.grey300:T.teal,color:"#fff",border:"none",borderRadius:10,padding:"14px",cursor:loading?"not-allowed":"pointer",fontFamily:"'DM Sans',sans-serif",fontWeight:700,fontSize:16,display:"flex",alignItems:"center",justifyContent:"center",gap:10,minHeight:52,transition:"all .2s",boxShadow:loading?"none":`0 4px 16px ${T.teal}40`,marginTop:4}}>
              {loading
                ? <><Spinner size={18} color="#fff"/><span>{t.pleaseWait}</span></>
                : mode==="login"
                ? <><span>{t.logInBtn}</span><span>→</span></>
                : <><span>{t.createAccount}</span><span>→</span></>
              }
            </button>

            {/* Divider */}
            <div style={{display:"flex",alignItems:"center",gap:12,color:T.grey300,fontSize:13}}>
              <div style={{flex:1,height:1,background:T.grey100}}/>
              <span>{t.or}</span>
              <div style={{flex:1,height:1,background:T.grey100}}/>
            </div>

            {/* Google placeholder */}
            <button style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10,padding:"12px",borderRadius:10,border:`1.5px solid ${T.grey200}`,background:T.white,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontSize:14,fontWeight:500,color:T.grey700,transition:"all .18s"}}
              onMouseOver={e=>e.currentTarget.style.borderColor=T.grey300}
              onMouseOut={e=>e.currentTarget.style.borderColor=T.grey200}>
              <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg>
              Continue with Google <span style={{fontSize:11,color:T.grey400,fontFamily:"'DM Mono',monospace"}}>(coming soon)</span>
            </button>

          </div>

          {/* Switch mode */}
          <div style={{marginTop:24,textAlign:"center",fontSize:14,color:T.grey500}}>
            {mode==="login"
              ? <>{t.dontHaveAccount}{" "}<button onClick={()=>{setMode("signup");setErr("");}} style={{background:"none",border:"none",color:T.teal,cursor:"pointer",fontSize:14,fontFamily:"'DM Sans',sans-serif",fontWeight:600,padding:0}}>{t.signUpFree}</button></>
              : <>{t.alreadyHaveAccount}{" "}<button onClick={()=>{setMode("login");setErr("");}} style={{background:"none",border:"none",color:T.teal,cursor:"pointer",fontSize:14,fontFamily:"'DM Sans',sans-serif",fontWeight:600,padding:0}}>{t.logInLink}</button></>
            }
          </div>

          <div style={{marginTop:20,textAlign:"center",fontSize:11,color:T.grey400,lineHeight:1.6}}>
            {t.byContinuing}{" "}
            <span style={{color:T.grey500,cursor:"pointer",textDecoration:"underline"}}>{t.termsOfService}</span>{" "}{t.and}{" "}
            <span style={{color:T.grey500,cursor:"pointer",textDecoration:"underline"}}>{t.privacyPolicy}</span>
            <br/><a href="mailto:contact@physioroutine.com" style={{color:T.grey400,fontSize:11,textDecoration:"none"}}>contact@physioroutine.com</a>
          </div>
          {/* Dev / troubleshooting — clear all local data */}
          <button onClick={()=>{
            if (window.confirm("Clear all saved data and start fresh?")) {
              try {
                // Clear everything physio-related from localStorage
                Object.keys(localStorage).filter(k=>k.startsWith("physio")).forEach(k=>localStorage.removeItem(k));
                sessionStorage.clear();
              } catch {}
              window.location.reload();
            }
          }} style={{marginTop:16,background:"none",border:"none",cursor:"pointer",fontSize:11,color:T.grey300,fontFamily:"'DM Sans',sans-serif",display:"block",width:"100%",textAlign:"center"}}>
            {t.havingTrouble}
          </button>
        </div>
      </div>
    </div>
  );
}

function SliderInput({value, onChange, min=0, max=10, color}) {
  const trackRef = React.useRef(null);
  const active = React.useRef(false);

  function getVal(clientX) {
    const rect = trackRef.current.getBoundingClientRect();
    return Math.round(Math.max(0, Math.min(1, (clientX - rect.left) / rect.width)) * (max - min) + min);
  }

  function onDown(e) {
    e.preventDefault();
    active.current = true;
    if (e.pointerId !== undefined) {
      try { trackRef.current.setPointerCapture(e.pointerId); } catch {}
    }
    onChange(getVal(e.touches ? e.touches[0].clientX : e.clientX));
  }

  function onMove(e) {
    if (!active.current) return;
    e.preventDefault();
    onChange(getVal(e.touches ? e.touches[0].clientX : e.clientX));
  }

  function onUp() { active.current = false; }

  const pct = ((value - min) / (max - min)) * 100;
  const col = color || T.teal;

  return (
    <div ref={trackRef}
      onPointerDown={onDown} onPointerMove={onMove} onPointerUp={onUp} onPointerCancel={onUp}
      onTouchStart={onDown} onTouchMove={onMove} onTouchEnd={onUp}
      style={{position:'relative',height:44,cursor:'pointer',userSelect:'none',
              touchAction:'none',WebkitUserSelect:'none',margin:'6px 0'}}
    >
      <div style={{position:'absolute',top:'50%',left:0,right:0,height:6,
                   marginTop:-3,borderRadius:3,background:'#e4e7ed',pointerEvents:'none'}}>
        <div style={{width:pct+'%',height:'100%',borderRadius:3,background:col}}/>
      </div>
      <div style={{position:'absolute',top:'50%',left:pct+'%',
                   transform:'translate(-50%,-50%)',width:28,height:28,
                   borderRadius:'50%',background:col,
                   boxShadow:'0 2px 10px rgba(0,0,0,.3)',zIndex:2,pointerEvents:'none'}}/>
    </div>
  );
}

      <div style={{maxWidth:600,margin:"0 auto",padding:"0 clamp(14px,4vw,32px)"}}>

        <div style={{background:T.white,border:`1px solid ${T.grey100}`,borderRadius:14,padding:"clamp(22px,4vw,34px) clamp(18px,4vw,30px)",boxShadow:"0 4px 24px rgba(10,126,110,.06)",animation:"fadeUp .4s ease"}}>
          {steps[step]}
          {step>0&&<button onClick={()=>setStep(s=>s-1)} style={{background:"none",border:"none",cursor:"pointer",color:T.grey400,fontSize:14,fontFamily:"'DM Sans',sans-serif",marginTop:20,display:"flex",alignItems:"center",gap:5,padding:"8px 0",minHeight:44}}>{t.backBtn}</button>}

              {d.specific&&<> · {d.specific}</>}{d.pain>0&&<> · {t.painLevel} {d.pain}/10</>}

          </div>
        )}
      </div>
    </div>
  );
}

// SUBSCRIBE SCREEN — translated
// ═══════════════════════════════════════════════════════════════
function SubscribeScreen({onPaid,user,onLogin,onBack,lang,trialUsed=false}) {
  const t=useT(lang);
  // chosen state declared above with PLANS
  const [paying,setPaying]=useState(false);
  const PLANS=[
    {k:"trial",  name:t.plan1name,price:"€0", per:t.plan1per,desc:t.plan1f1, disabled:trialUsed},
    {k:"standard",name:t.plan2name,price:"€10",per:t.plan2per,desc:t.plan2f1, disabled:false},
    {k:"premium", name:t.plan3name,price:"€30",per:t.plan3per,desc:t.plan3f1, disabled:false},
  ];
  // Auto-select standard if trial already used
  const [chosen, setChosen] = useState(trialUsed ? "standard" : "trial");

  function pay() {
    if (!user) { onLogin(); return; }
    // Trial — no payment needed
    if (chosen === "trial") { onPaid("trial"); return; }
    // Paid plans — simulate for now (Stripe integration coming soon)
    setPaying(true);
    setTimeout(() => { setPaying(false); onPaid(chosen); }, 1200);
  }
  const p=PLANS.find(x=>x.k===chosen);
  return (
    <div style={{minHeight:"100vh",background:`linear-gradient(155deg,${T.white} 0%,${T.tealPale} 100%)`,display:"flex",alignItems:"center",justifyContent:"center",padding:"80px 16px"}}>
      <div style={{background:T.white,border:`1px solid ${T.grey100}`,borderRadius:16,padding:"clamp(28px,5vw,40px) clamp(20px,5vw,36px)",width:"100%",maxWidth:460,boxShadow:"0 20px 60px rgba(10,126,110,.09)",animation:"scaleIn .4s ease"}}>
        {onBack && <button onClick={onBack} style={{background:"none",border:"none",cursor:"pointer",color:T.grey400,fontSize:13,fontFamily:"'DM Sans',sans-serif",display:"flex",alignItems:"center",gap:4,marginBottom:16,padding:0}}>← Back</button>}
        <div style={{textAlign:"center",marginBottom:trialUsed?12:26}}>
          <div style={{...serif,fontWeight:600,fontSize:22,marginBottom:5}}>{t.oneLastStep}</div>
          <div style={{color:T.grey500,fontSize:14}}>{t.unlockProgramme}</div>
        </div>
        {trialUsed&&<div style={{background:"#fffbeb",border:"1px solid #fde68a",borderRadius:8,padding:"10px 14px",marginBottom:16,fontSize:13,color:"#92400e",display:"flex",gap:8,alignItems:"flex-start"}}>
          <span style={{flexShrink:0}}>ℹ️</span>
          <span>Your free trial has already been used. Choose a plan below to continue your rehabilitation.</span>
        </div>}
        <div style={{display:"flex",gap:8,marginBottom:20}}>
          {PLANS.map(pl=>(
            <button key={pl.k} onClick={()=>!pl.disabled&&setChosen(pl.k)} disabled={pl.disabled}
              style={{flex:1,padding:"11px 6px",borderRadius:8,cursor:pl.disabled?"not-allowed":"pointer",fontFamily:"'DM Sans',sans-serif",border:`1.5px solid ${pl.disabled?T.grey100:chosen===pl.k?T.teal:T.grey200}`,background:pl.disabled?T.grey50:chosen===pl.k?T.tealPale:"transparent",color:pl.disabled?T.grey300:chosen===pl.k?T.teal:T.grey600,transition:"all .15s",textAlign:"center",WebkitTapHighlightColor:"transparent",minHeight:80,opacity:pl.disabled?.5:1,position:"relative"}}>
              <div style={{fontSize:11,fontWeight:600,marginBottom:3,...mono,textTransform:"uppercase"}}>{pl.name}</div>
              <div style={{...serif,fontSize:20,fontWeight:600,color:pl.disabled?T.grey300:chosen===pl.k?T.navy:T.grey300}}>{pl.price}</div>
              <div style={{fontSize:10,color:T.grey400,marginTop:1}}>/ {pl.per}</div>
              {pl.disabled&&<div style={{position:"absolute",top:4,right:4,background:T.grey200,borderRadius:10,padding:"1px 7px",fontSize:9,...mono,color:T.grey500}}>USED</div>}
            </button>
          ))}
        </div>
        <div style={{background:T.offwhite,borderRadius:8,padding:"13px 16px",marginBottom:18,fontSize:14,color:T.grey600}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}><span>{t.plan}</span><strong style={{color:T.navy}}>{p?.name}</strong></div>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}><span>{t.access}</span><strong style={{color:T.grey700}}>{p?.desc}</strong></div>
          <div style={{display:"flex",justifyContent:"space-between",marginTop:8,paddingTop:8,borderTop:`1px solid ${T.grey100}`}}><span>{t.totalToday}</span><strong style={{color:T.teal,fontSize:16}}>{p?.price}</strong></div>
        </div>
        <button onClick={pay} disabled={paying} style={{width:"100%",background:T.teal,color:T.white,border:"none",borderRadius:9,padding:15,cursor:paying?"not-allowed":"pointer",fontFamily:"'DM Sans',sans-serif",fontWeight:600,fontSize:16,opacity:paying?.75:1,display:"flex",alignItems:"center",justifyContent:"center",gap:9,transition:"all .18s",minHeight:54}}>
          {paying&&<Spinner size={18} color={T.white}/>}
          {paying?"…":chosen==="trial"?t.startFreeTrial2:`${t.payAndStart} — ${p?.price}`}
        </button>
        <div style={{textAlign:"center",marginTop:10,fontSize:11,color:T.grey400,...mono}}>{t.secureCheckout}</div>
      </div>
    </div>
  );
}

// LOADING SCREEN — translated
// ═══════════════════════════════════════════════════════════════
function LoadingScreen({lang, dayNum=1}) {
  const t=useT(lang);
  const msgs=[t.l1,t.l2,t.l3,t.l4,t.l5];
  const [s,setS]=useState(0);
  useEffect(()=>{const timer=setInterval(()=>setS(x=>x<msgs.length-1?x+1:x),900);return()=>clearInterval(timer);},[]);
  return (
    <div style={{minHeight:"100vh",background:T.white,display:"flex",alignItems:"center",justifyContent:"center",padding:"80px 20px",flexDirection:"column",gap:26}}>
      <Spinner size={58}/>
      <div style={{textAlign:"center",maxWidth:300}}>
        <div style={{...serif,fontWeight:600,fontSize:20,marginBottom:10}}>{dayNum > 1 ? `${t.buildingPlan} — Day ${dayNum}` : t.buildingPlan}</div>
        <div style={{fontSize:14,color:T.grey500,animation:"pulse 1.5s ease infinite",minHeight:20}}>{msgs[s]}</div>
      </div>
      <div style={{display:"flex",gap:6}}>
        {msgs.map((_,i)=><div key={i} style={{width:i<=s?20:7,height:7,borderRadius:4,background:i<=s?T.teal:T.grey100,transition:"all .4s ease"}}/>)}
      </div>
    </div>
  );
}

    setShowCI(canCheckin);

      // Calculate tomorrow date for display

          <div style={{position:"absolute",right:-40,top:-40,width:200,height:200,borderRadius:"50%",background:"rgba(10,126,110,.14)"}}/>
          <div style={{position:"absolute",right:18,top:18}}>

          <div style={{fontSize:13,color:"rgba(255,255,255,.48)",marginBottom:14}}>{plan.region} · {plan.totalDuration}</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {plan.tags?.map(tag=><span key={tag} style={{background:"rgba(10,126,110,.2)",border:"1px solid rgba(10,126,110,.3)",borderRadius:4,padding:"3px 10px",fontSize:11,...mono,color:T.tealLight}}>{tag}</span>)}

// ── MilestoneChecker ──────────────────────────────────────────────────────────
function getMilestones(planHistory, dayNum, streak) {
  const milestones = [];
  const plans = planHistory?.length || 0;
  const initialPain = planHistory?.[planHistory.length-1]?.pain || 0;
  const currentPain = planHistory?.[0]?.pain || 0;
  const painDrop = Number(initialPain) - Number(currentPain);

  if (dayNum >= 7)  milestones.push({ icon:"🏅", title:"One Week In!", body:"You've completed 7 days of your programme. Great commitment." });
  if (dayNum >= 14) milestones.push({ icon:"🥈", title:"Two Weeks Strong", body:"14 days done. Your tissues are adapting and getting stronger." });
  if (dayNum >= 21) milestones.push({ icon:"🏆", title:"Programme Complete!", body:"You've finished your full 21-day programme. Time for a reassessment." });
  if (streak >= 7)  milestones.push({ icon:"🔥", title:"7-Day Streak!", body:"A full week without missing a session — exceptional consistency." });
  if (streak >= 14) milestones.push({ icon:"⚡", title:"14-Day Streak!", body:"Two weeks straight. You're building a real habit." });
  if (painDrop >= 3) milestones.push({ icon:"📉", title:`Pain dropped by ${painDrop} points`, body:"Your pain score has significantly improved since you started. Keep going!" });
  if (plans >= 3)   milestones.push({ icon:"📋", title:"3 Plans Generated", body:"You've been assessed 3 times — your recovery is being carefully tracked." });

  return milestones;
}

// ── Streak calculator ─────────────────────────────────────────────────────────
function getStreak() {
  try {
    const history = JSON.parse(localStorage.getItem("physio_checkin_history") || "[]");
    if (!history.length) return 0;
    // Only count valid date strings
    const validDates = history.filter(d => d && !isNaN(new Date(d).getTime()));
    if (!validDates.length) return 0;
    const sorted = [...validDates].sort((a,b) => new Date(b) - new Date(a));
    let streak = 0;
    let expected = new Date();
    expected.setHours(0,0,0,0);
    for (const dateStr of sorted) {
      const d = new Date(dateStr);
      d.setHours(0,0,0,0);
      const diff = (expected - d) / 86400000;
      if (diff <= 1) { streak++; expected = d; }
      else break;
    }
    return streak;
  } catch { return 0; }
}

function saveCheckinToHistory() {
  try {
    const today = new Date().toISOString().split("T")[0];
    const history = JSON.parse(localStorage.getItem("physio_checkin_history") || "[]");
    if (!history.includes(today)) {
      history.push(today);
      localStorage.setItem("physio_checkin_history", JSON.stringify(history));
    }
  } catch {}
}

  const [done,    setDone]    = useState(doneToday);

  function submit() {
    try {
      localStorage.setItem("physio_last_checkin", todayKey);

      const painKey = "physio_pain_history";

      try {

                      <div style={{width:36,height:36,borderRadius:8,background:T.tealPale,display:"flex",alignItems:"center",justifyContent:"center",...mono,fontSize:11,color:T.teal,fontWeight:600,flexShrink:0}}>D{p.day}</div>
                      <div style={{flex:1,minWidth:100}}>
                        <div style={{fontWeight:600,fontSize:14}}>{p.title}</div>
                        <div style={{fontSize:12,color:T.grey400,marginTop:1}}>{p.date}</div>
                      </div>
                      <div style={{textAlign:"right",flexShrink:0}}>
                        <div style={{fontSize:13,fontWeight:600,color:Number(p.pain)>=7?T.red:Number(p.pain)>=4?T.orange:T.teal}}>{t.pain||"Pain"}: {p.pain}/10</div>
                        <div style={{fontSize:11,color:T.grey400,marginTop:1}}>{p.progress}%</div>
                      </div>
                    </div>
                  ))
              }
            </div>
          )}
          {tab==="plans"&&(
            <div style={{animation:"fadeUp .35s ease"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20,flexWrap:"wrap",gap:10}}>
                <h2 style={{...serif,fontWeight:600,fontSize:"clamp(20px,3vw,24px)"}}>{t.planHistory}</h2>
                <button className="btn-teal" onClick={()=>{
              // Reset day counter and history for a new programme
              onStartPlan();
            }} style={{padding:"9px 18px",fontSize:13}}>{t.startNewPlan}</button>
              </div>
              {allPlans.length===0
                ? <div style={{background:T.white,border:`1px solid ${T.grey100}`,borderRadius:12,padding:"40px 20px",textAlign:"center"}}>
                    <div style={{fontWeight:600,fontSize:16,color:T.navy,marginBottom:16}}>{t.noPlansYetShort||"No plans yet"}</div>
                    <div style={{fontSize:13,color:T.grey500,marginBottom:20}}>{t.completeAssessment||"Complete an assessment to get your rehab plan."}</div>
                    <button className="btn-teal" onClick={onStartPlan} style={{padding:"10px 24px"}}>Start Assessment →</button>
                  </div>
                : allPlans.map((p,i)=>(
                    <div key={i} className="card card-hover" style={{marginBottom:10,cursor:"pointer"}} onClick={onViewPlan}>
                      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:11,flexWrap:"wrap"}}>
                        <div style={{width:38,height:38,borderRadius:8,background:T.tealPale,display:"flex",alignItems:"center",justifyContent:"center",...mono,fontSize:11,color:T.teal,fontWeight:700,flexShrink:0}}>D{p.day}</div>
                        <div style={{flex:1,minWidth:100}}>
                          <div style={{fontWeight:600,fontSize:14}}>{p.title}</div>
                          <div style={{fontSize:12,color:T.grey400}}>{p.region} · {p.date}</div>
                        </div>
                        <div style={{background:p.progress===100?T.greenPale:T.tealPale,border:`1px solid ${p.progress===100?(T.green||"#059669")+"40":T.tealMid}`,borderRadius:5,padding:"3px 10px",fontSize:11,...mono,color:p.progress===100?(T.green||"#059669"):T.teal,fontWeight:600,flexShrink:0}}>
                          {p.progress===100?"Complete":`${p.progress}%`}
                        </div>
                      </div>
                      <div style={{height:3,background:T.grey100,borderRadius:2,overflow:"hidden"}}>
                        <div style={{height:3,width:`${p.progress}%`,background:`linear-gradient(90deg,${T.teal},${T.tealLight})`,borderRadius:2}}/>
                      </div>
                    </div>
                  ))
              }
            </div>
          )}
          {tab==="progress"&&(
            <div style={{animation:"fadeUp .35s ease"}}>
              <h2 style={{...serif,fontWeight:600,fontSize:"clamp(20px,3vw,24px)",marginBottom:20}}>{t.progressTracking}</h2>
              {allPlans.length===0
                ? <div style={{background:T.white,border:`1px solid ${T.grey100}`,borderRadius:12,padding:"40px 20px",textAlign:"center"}}>
                    <div style={{fontSize:40,marginBottom:12}}>📊</div>
                    <div style={{fontWeight:600,fontSize:16,color:T.navy,marginBottom:6}}>No progress data yet</div>
                    <div style={{fontSize:13,color:T.grey500,marginBottom:20}}>Complete your first plan to start tracking your progress.</div>
                    <button className="btn-teal" onClick={onStartPlan} style={{padding:"10px 24px"}}>Start Assessment →</button>
                  </div>
                : <>
                    {/* ── Pain Trend Line Chart ─────────────────────────────── */}
                    <div className="card" style={{marginBottom:14}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:8}}>
                        <div>
                          <div style={{fontWeight:600,fontSize:14,color:T.navy}}>Pain Trend</div>
                          <div style={{fontSize:12,color:T.grey400,marginTop:2,...mono}}>Lower is better</div>
                        </div>
                        {(()=>{
                          const pts = [...allPlans].reverse().slice(-10);
                          const first = Number(pts[0]?.pain)||0;
                          const last  = Number(pts[pts.length-1]?.pain)||0;
                          const diff  = first - last;
                          return diff > 0
                            ? <div style={{display:"flex",alignItems:"center",gap:5,background:"#F0FDF4",border:"1px solid #BBF7D0",borderRadius:8,padding:"5px 10px"}}>
                                <span style={{color:"#16A34A",fontWeight:700,fontSize:13}}>↓ {diff} pts</span>
                                <span style={{color:"#16A34A",fontSize:11}}>improvement</span>
                              </div>
                            : diff < 0
                            ? <div style={{display:"flex",alignItems:"center",gap:5,background:"#FEF2F2",border:"1px solid #FECACA",borderRadius:8,padding:"5px 10px"}}>
                                <span style={{color:T.red,fontWeight:700,fontSize:13}}>↑ {Math.abs(diff)} pts</span>
                                <span style={{color:T.red,fontSize:11}}>increase</span>
                              </div>
                            : null;
                        })()}
                      </div>
                      {/* SVG line chart */}
                      {(()=>{
                        // Build chart — deduplicate by day, sort ascending
                        const seen = new Set();
                        const chartData = [...checkinHistory]
                          .filter(p => p && typeof p.pain === "number" && p.day > 0)
                          .sort((a,b) => (a.day||0) - (b.day||0))
                          .filter(p => { if(seen.has(p.day)) return false; seen.add(p.day); return true; });
                        // If no Day 1 entry, add intake pain as Day 1 baseline
                        // Find Day 1 intake pain from plan history (oldest entry = highest index since unshift)
                        const hasD1 = chartData.some(p => p.day === 1);
                        const day1Plan = allPlans.find(p => p.day === 1);
                        const intakePain = day1Plan ? Number(day1Plan.pain)||0
                          : allPlans.length > 0 ? Number(allPlans[allPlans.length-1]?.pain)||0 : null;
                        const raw = (!hasD1 && intakePain)
                          ? [{day:1, pain:intakePain}, ...chartData].sort((a,b)=>a.day-b.day)
                          : chartData;
                        if (raw.length < 2) return (
                          <div style={{textAlign:"center",color:T.grey400,fontSize:13,padding:"20px 0"}}>
                            Complete at least 2 check-ins to see your pain trend.
                          </div>
                        );
                        const W=300, H=90, pad=8;
                        const vals = raw.map(p=>Number(p.pain)||0);
                        const minV=0, maxV=10;
                        if (vals.length < 2) return (
                          <div style={{textAlign:"center",color:T.grey400,fontSize:13,padding:"20px 0"}}>
                            Complete at least 2 check-ins to see your pain trend.
                          </div>
                        );
                        const xStep = (W-pad*2)/(vals.length-1);
                        const yScale = v => pad + ((maxV-v)/(maxV-minV))*(H-pad*2);
                        // Build SVG path
                        const points = vals.map((v,i)=>({
                          x: pad + i*xStep, y: yScale(v), v, label: `D${raw[i]?.day||i+1}`
                        }));
                        const pathD = points.map((p,i)=>`${i===0?"M":"L"}${p.x},${p.y}`).join(" ");
                        const areaD = pathD + ` L${points[points.length-1].x},${H} L${points[0].x},${H} Z`;
                        const colorAt = v => v>=7?"#b91c1c":v>=5?"#b45309":"#0a7e6e";
                        const lastColor = colorAt(vals[vals.length-1]);
                        return (
                          <div>
                            <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:"auto",overflow:"visible"}}>
                              <defs>
                                <linearGradient id="painGrad" x1="0" y1="0" x2="0" y2="1">
                                  <stop offset="0%" stopColor={lastColor} stopOpacity="0.18"/>
                                  <stop offset="100%" stopColor={lastColor} stopOpacity="0.02"/>
                                </linearGradient>
                              </defs>
                              {/* Grid lines */}
                              {[0,2,4,6,8,10].map(v=>(
                                <g key={v}>
                                  <line x1={pad} y1={yScale(v)} x2={W-pad} y2={yScale(v)} stroke="#e4e7ed" strokeWidth="0.5"/>
                                  <text x={pad-3} y={yScale(v)+3} fontSize="7" fill="#8b95a5" textAnchor="end">{v}</text>
                                </g>
                              ))}
                              {/* Area fill */}
                              <path d={areaD} fill="url(#painGrad)"/>
                              {/* Line */}
                              <path d={pathD} fill="none" stroke={lastColor} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                              {/* Data points */}
                              {points.map((p,i)=>(
                                <g key={i}>
                                  <circle cx={p.x} cy={p.y} r="3.5" fill="white" stroke={colorAt(p.v)} strokeWidth="2"/>
                                  {(i===0||i===points.length-1)&&(
                                    <text x={p.x} y={p.y-7} fontSize="8" fill={colorAt(p.v)} textAnchor="middle" fontWeight="700">{p.v}</text>
                                  )}
                                </g>
                              ))}
                            </svg>
                            {/* X axis labels */}
                            <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}>
                              {points.map((p,i)=>(
                                <div key={i} style={{fontSize:9,color:T.grey400,...mono,textAlign:"center",flex:1}}>{i===0||i===points.length-1?p.label:""}</div>
                              ))}
                            </div>
                            {/* Legend */}
                            <div style={{display:"flex",gap:16,marginTop:10,flexWrap:"wrap"}}>
                              {[[T.teal,"Pain 0–4 (low)"],[T.orange,"Pain 5–6 (moderate)"],[T.red,"Pain 7–10 (high)"]].map(([col,label])=>(
                                <div key={label} style={{display:"flex",alignItems:"center",gap:5}}>
                                  <div style={{width:10,height:3,borderRadius:2,background:col}}/>
                                  <span style={{fontSize:10,color:T.grey400}}>{label}</span>
                                </div>
                              ))}
                            </div>
                          </div>
                        );
                      })()}
                    </div>

                    {/* ── Stats grid ───────────────────────────────────────── */}
                    <div className="grid-2">
                      {[
                         {l:"Avg Pain",    v:(()=>{
            const _seen = new Set();
            const _base = [...checkinHistory]
              .sort((a,b)=>(a.day||0)-(b.day||0))
              .filter(p=>{ if(_seen.has(p.day)) return false; _seen.add(p.day); return true; });
            // Add intake pain as Day 1 if missing
            const _hasD1 = _base.some(p=>p.day===1);
            const _day1Plan = allPlans.find(p=>p.day===1);
            const _intakePain = _day1Plan ? Number(_day1Plan.pain)||0
              : allPlans.length>0 ? Number(allPlans[allPlans.length-1]?.pain)||0 : null;
            const pts = [..._base];
            if (!_hasD1 && _intakePain) pts.unshift({day:1, pain:_intakePain});
            pts.sort((a,b)=>a.day-b.day);
            if (pts.length===0 && _intakePain) pts.push({day:1, pain:_intakePain});
            if (!pts.length) return "—";
            const avg = pts.reduce((a,p)=>a+(Number(p.pain)||0),0)/pts.length;
            return avg.toFixed(1)+"/10";
          })(), t2:"across all sessions",c:T.teal},
                         {l:"Current Day", v:`Day ${dayNum}`,                                                                           t2:"of your current plan",c:T.orange},
                         {l:"Sessions",    v:allPlans.length,                                                                           t2:"total plans generated",c:T.teal},
                         {l:"Streak",      v:`${checkinHistory.length} days`,                                                            t2:"consecutive check-ins",c:T.navy},
                       ].map((s,i)=>(
                         <div key={i} className="card">
                           <div style={{...serif,fontSize:22,fontWeight:600,color:s.c,letterSpacing:"-.02em"}}>{s.v}</div>
                           <div style={{fontSize:12,fontWeight:500,marginTop:3}}>{s.l}</div>
                           <div style={{fontSize:11,color:T.grey400,marginTop:2,...mono}}>{s.t2}</div>
                         </div>
                       ))}
                    </div>
                  </>
              }
            </div>
          )}

          {/* CHECK-IN TAB */}
          {tab==="checkin"&&(
            <CheckInPanel plan={plan} dayNum={dayNum} onCheckIn={onCheckIn} onStartPlan={onStartPlan} onSaveCheckin={entry=>setCheckinHistory(prev=>{const f=prev.filter(p=>p.day!==entry.day);return [...f,entry].sort((a,b)=>a.day-b.day);})}/>
          )}

        </main>
      </div>
    </div>
  );
}

function usePDFExport() {
  const exportPDF = useCallback((plan, dayNum, subscription, patientName) => {
    if (!plan) return;
    const date = new Date().toLocaleDateString("en-GB",{day:"numeric",month:"long",year:"numeric"});
    const phC = ["#b91c1c","#b45309","#0a7e6e"];

        ));

    }
    if ((plan.electrotherapy||[]).length > 0) {
      wrap.appendChild(txt("div","font-weight:700;font-size:15px;color:#0f1f3d;margin:18px 0 10px;padding-left:10px;border-left:3px solid #0a7e6e;","Electrotherapy Protocols"));
      plan.electrotherapy.forEach(function(proc) {
        wrap.appendChild(el("div","background:#fff;border:1px solid #e4e7ed;border-radius:10px;padding:14px;margin-bottom:10px;",

          '<div style="font-size:12px;color:#8b95a5;font-family:monospace;margin-bottom:8px">Duration: ' + (proc.duration||"") + ' - Frequency: ' + (proc.frequency||"") + '</div>' +
          '<div style="font-size:13px;color:#4a5568;line-height:1.65">' + (proc.protocol||proc.rationale||"") + '</div>' +
          (proc.placement ? '<div style="background:#f7f8fa;border-radius:6px;padding:8px 10px;font-size:13px;color:#4a5568;margin-top:6px"><strong>Placement:</strong> ' + proc.placement + '</div>' : '')
        ));
      });
    }
    wrap.appendChild(txt("div","text-align:center;margin-top:24px;font-size:12px;color:#8b95a5;font-family:monospace;",
      "PhysioRoutine - physioroutine.com - contact@physioroutine.com - Generated " + date));
    ov.appendChild(wrap);
    document.body.appendChild(ov);
  }, []);
  return { exportPDF };
}

// FEATURE 2: PUSH NOTIFICATIONS SYSTEM
// Browser Push API + in-app notification center
// ═══════════════════════════════════════════════════════════════

// Notification types and schedules
const NOTIF_TYPES = {
  daily_reminder:   { icon:"🩺", title:"Time for your daily exercise", color:T.teal },
  pain_checkin:     { icon:"📊", title:"How are you feeling today?",   color:T.orange },
  milestone:        { icon:"🏆", title:"Milestone reached!",           color:T.green },
  streak:           { icon:"🔥", title:"Keep your streak going!",      color:T.orange },
  new_plan:         { icon:"✨", title:"Your new plan is ready",       color:T.teal },
  appointment:      { icon:"📅", title:"Appointment reminder",         color:T.purple },
};

const DEFAULT_SCHEDULE = [
  { id:"morning_exercise", type:"daily_reminder",  time:"08:00", label:"Morning exercise reminder",   enabled:true },
  { id:"pain_checkin",     type:"pain_checkin",    time:"09:00", label:"Daily pain check-in",         enabled:true },
  { id:"evening_review",   type:"daily_reminder",  time:"19:00", label:"Evening session reminder",    enabled:false },
  { id:"streak_reminder",  type:"streak",          time:"20:00", label:"Streak motivation nudge",     enabled:true },
];

function useNotifications() {
  const [permission, setPermission] = useState(
    typeof Notification !== "undefined" ? Notification.permission : "default"
  );
  const [schedule, setSchedule] = useState(() => {
    try { return JSON.parse(localStorage.getItem("physio_notif_schedule") || "null") || DEFAULT_SCHEDULE; }
    catch { return DEFAULT_SCHEDULE; }
  });
  const [inAppNotifs, setInAppNotifs] = useState([]);
  const [unread, setUnread] = useState(0);
  const timersRef = useRef([]);

  // Save schedule
  useEffect(() => {
    try { localStorage.setItem("physio_notif_schedule", JSON.stringify(schedule)); }
    catch {}
  }, [schedule]);

  // Request permission
  async function requestPermission() {
    if (typeof Notification === "undefined") return "denied";
    const result = await Notification.requestPermission();
    setPermission(result);
    return result;
  }

  // Send browser push notification
  function sendPush(type, body, data={}) {
    if (typeof Notification === "undefined" || Notification.permission !== "granted") return;
    const t = NOTIF_TYPES[type] || NOTIF_TYPES.daily_reminder;
    try {
      new Notification(t.title, {
        body,
        icon: "/favicon.ico",
        badge: "/favicon.ico",
        tag: type,
        data,
      });
    } catch {}
  }

  // Add in-app notification
  function addInApp(type, message, data={}) {
    const t = NOTIF_TYPES[type] || NOTIF_TYPES.daily_reminder;
    const notif = {
      id: Date.now() + Math.random(),
      type,
      icon: t.icon,
      title: t.title,
      message,
      color: t.color,
      time: new Date(),
      read: false,
      data,
    };
    setInAppNotifs(prev => [notif, ...prev].slice(0, 50));
    setUnread(n => n + 1);
    return notif.id;
  }

  // Simulate scheduled notifications (real app uses service worker)
  useEffect(() => {
    timersRef.current.forEach(clearTimeout);
    timersRef.current = [];

    schedule.filter(s => s.enabled).forEach(s => {
      const [h, m] = s.time.split(":").map(Number);
      const now = new Date();
      let next = new Date(now.getFullYear(), now.getMonth(), now.getDate(), h, m, 0);
      if (next <= now) next.setDate(next.getDate() + 1);
      const delay = next - now;
      if (delay < 24*60*60*1000) {
        const timer = setTimeout(() => {
          sendPush(s.type, `Reminder: ${s.label}`);
          addInApp(s.type, s.label);
        }, delay);
        timersRef.current.push(timer);
      }
    });
    return () => timersRef.current.forEach(clearTimeout);
  }, [schedule, permission]);

  function markAllRead() {
    setInAppNotifs(prev => prev.map(n => ({...n, read:true})));
    setUnread(0);
  }

  function markRead(id) {
    setInAppNotifs(prev => prev.map(n => n.id===id ? {...n,read:true} : n));
    setUnread(n => Math.max(0, n-1));
  }

  function clearAll() {
    setInAppNotifs([]);
    setUnread(0);
  }

  function toggleSchedule(id) {
    setSchedule(prev => prev.map(s => s.id===id ? {...s,enabled:!s.enabled} : s));
  }

  function updateTime(id, time) {
    setSchedule(prev => prev.map(s => s.id===id ? {...s,time} : s));
  }

  // Demo: fire a test notification immediately
  function fireDemo(type="daily_reminder") {
    const msgs = {
      daily_reminder: "Time to complete your knee rehabilitation exercises.",
      pain_checkin: "How is your pain today? Log your check-in to update your plan.",
      milestone: "You've completed Day 7 of your programme! Great progress.",
      streak: "You've maintained a 7-day streak. Keep it up!",
      new_plan: "Your Day 5 plan has been updated based on your progress.",
    };
    addInApp(type, msgs[type] || "PhysioRoutine reminder");
    sendPush(type, msgs[type] || "PhysioRoutine reminder");
  }

  return {
    permission, requestPermission,
    schedule, toggleSchedule, updateTime,
    inAppNotifs, unread, markRead, markAllRead, clearAll,
    addInApp, sendPush, fireDemo,
  };
}

// In-app toast (auto-dismiss)
function NotifToast({ notif, onDismiss }) {
  useEffect(()=>{
    if(!notif)return;
    const t=setTimeout(onDismiss,5000);
    return()=>clearTimeout(t);
  },[notif]);
  if(!notif)return null;
  const type=NOTIF_TYPES[notif.type]||NOTIF_TYPES.daily_reminder;
  return (
    <div className="notif-toast">
      <div style={{width:36,height:36,borderRadius:9,background:`${type.color}15`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>{type.icon}</div>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontWeight:600,fontSize:13,marginBottom:2}}>{notif.title}</div>
        <div style={{fontSize:12,color:T.grey500}}>{notif.message}</div>
      </div>
      <button onClick={onDismiss} style={{background:"none",border:"none",cursor:"pointer",color:T.grey400,fontSize:16,padding:0,flexShrink:0}}>✕</button>
    </div>
  );
}

        title: "Time for your daily session 💪",
        message: `Don't forget to complete Day ${dayNum} of your ${plan.title} plan.`,
      });
    }, 5000);
    return () => clearTimeout(timer);
  }, [user, plan, dayNum]);

  const go = useCallback(s => {
    setScreen(s);
    window.scrollTo({ top: 0, behavior: "smooth" });
